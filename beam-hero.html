<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GALAXY MOTO — Border Beam</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: #fff; color: #111; overflow: hidden; height: 100vh; }
    
    .beam-wrapper {
      position: fixed; inset: 0; z-index: 10;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 40px 20px; text-align: center;
    }

    .beam-container {
      position: relative;
      padding: 60px 80px;
      border-radius: 20px;
      border: 1px solid rgba(0,0,0,0.04);
      background: #fff;
      box-shadow: 0 4px 40px rgba(0,0,0,0.04);
      overflow: hidden;
    }

    /* ===== Border Beam (CSS only) ===== */
    .beam-container::before {
      content: '';
      position: absolute;
      inset: -2px;
      border-radius: 22px;
      padding: 2px;
      background: conic-gradient(from 0deg, transparent, #ffaa40, #9c40ff, transparent);
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      
      pointer-events: none;
    }

    @keyframes beam-rotate {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    /* ===== Content ===== */
    .hero__badge {
      display: inline-flex; align-items: center; gap: 8px;
      background: rgba(0,0,0,0.04); backdrop-filter: blur(8px);
      border: 1px solid rgba(0,0,0,0.06);
      color: #666; font-size: 13px; font-weight: 500;
      padding: 8px 16px; border-radius: 999px; margin-bottom: 32px;
    }
    .hero__badge-dot { width: 8px; height: 8px; background: #62b56a; border-radius: 50%; }
    .hero__title { font-size: 44px; font-weight: 800; line-height: 1.15; margin-bottom: 16px; }
    .hero__title-highlight { background: linear-gradient(135deg, #0bc5ea, #8b5cf6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .hero__subtitle { font-size: 17px; color: #555; margin-bottom: 32px; max-width: 520px; line-height: 1.55; }
    .hero__actions { display: flex; flex-direction: column; gap: 12px; align-items: center; width: 100%; max-width: 360px; margin: 0 auto; }
    .hero__actions-row { display: flex; gap: 10px; width: 100%; }
    .hero__actions-row .hero__btn { flex: 1; }
    .hero__btn { display: inline-flex; align-items: center; justify-content: center; padding: 13px 28px; font-family: 'Inter', sans-serif; font-size: 15px; font-weight: 600; border-radius: 999px; cursor: pointer; transition: all .25s ease; border: none; text-decoration: none; white-space: nowrap; width: 100%; }
    .hero__btn--primary { background: #111; color: #fff; border: 1.5px solid rgba(0,0,0,0.08); }
    .hero__btn--primary:hover { background: #333; transform: translateY(-1px); }
    .hero__btn--outline { background: transparent; color: #111; border: 1.5px solid rgba(0,0,0,0.15); }
    .hero__btn--outline:hover { background: rgba(0,0,0,0.05); transform: translateY(-1px); }
    .hero__btn--gradient { background: linear-gradient(135deg, #0bc5ea, #8b5cf6); color: #fff; }
    .hero__btn--gradient:hover { opacity: .9; transform: translateY(-1px); }
    .reviews-trigger { display: inline-flex; align-items: center; gap: 10px; cursor: pointer; margin-bottom: 24px; padding: 8px 20px 8px 16px; border-radius: 999px; background: rgba(0,0,0,0.04); backdrop-filter: blur(8px); border: 1px solid rgba(0,0,0,0.06); transition: all .25s; text-decoration: none; }
    .reviews-trigger:hover { background: rgba(0,0,0,0.08); transform: translateY(-1px); }
    .reviews-trigger__star { width: 36px; height: 36px; background: linear-gradient(135deg,#0bc5ea,#8b5cf6); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 16px; }
    .reviews-trigger__text { font-size: 13px; font-weight: 600; color: #111; }
    .reviews-trigger__badge { background: #fc0; padding: 1px 6px; border-radius: 4px; font-size: 11px; font-weight: 700; color: #111; }
    .reviews-trigger__label { font-size: 12px; color: #999; }
    .chat-fab { position: fixed; bottom: 24px; right: 24px; z-index: 100; width: 56px; height: 56px; background: linear-gradient(135deg, #0bc5ea, #8b5cf6); color: #fff; border-radius: 50%; border: none; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 20px rgba(0,0,0,0.3); cursor: pointer; transition: all .25s; text-decoration: none; }
    .chat-fab:hover { transform: scale(1.1); }

    @media (max-width: 768px) { 
      .hero__title { font-size: 28px; } 
      .hero__subtitle { font-size: 15px; } 
      .hero__btn { font-size: 13px; padding: 11px 20px; } 
      .beam-container { padding: 40px 30px; }
    }
    @media (max-width: 480px) { 
      .hero__title { font-size: 24px; } 
      .hero__actions-row { flex-direction: column; } 
      .beam-container { padding: 30px 20px; border-radius: 16px; }
    }
  </style>
</head>
<body>

<div class="beam-wrapper">
  <div class="beam-container">
    <div class="hero__badge"><span class="hero__badge-dot"></span> Мототехника и сервис в Сочи</div>
    <div class="hero__title">GALAXY <span class="hero__title-highlight">MOTO</span><br>Полный цикл твоего движения</div>
    <div class="hero__subtitle">Покупка, аренда, честный сервис и<br>оригинальные запчасти для мототехники.<br>Берем все заботы на себя</div>
    <a class="reviews-trigger" href="#">
      <div class="reviews-trigger__star">⭐</div>
      <span class="reviews-trigger__text">Рейтинг <span class="reviews-trigger__badge">5.0</span></span>
      <span class="reviews-trigger__label">на Яндекс.Картах</span>
      <svg width="18" height="18" viewBox="0 0 20 20" fill="none"><defs><linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#0bc5ea"/><stop offset="100%" stop-color="#8b5cf6"/></linearGradient></defs><path d="M8 5C8 5 13 9 13 10C13 11 8 15 8 15" stroke="url(#g)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg>
    </a>
    <div class="hero__actions">
      <button class="hero__btn hero__btn--primary">Выбрать технику</button>
      <div class="hero__actions-row">
        <button class="hero__btn hero__btn--outline">Взять в аренду</button>
        <button class="hero__btn hero__btn--gradient">Записаться на сервис</button>
      </div>
    </div>
  </div>
</div>

<a class="chat-fab" href="#">
  <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
</a>

</body>
</html>
