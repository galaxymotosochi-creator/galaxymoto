<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GALAXY MOTO — Border Beam</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: #fff; color: #111;  height: 100vh; }
    
    .beam-wrapper {
      position: fixed; inset: 0; z-index: 10;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 40px 20px; text-align: center;
    }

    /* FIXED */
.beam-container {
      position: relative;
      padding: 60px 80px;
      border-radius: 20px;
      border: 2px solid transparent;
      background: linear-gradient(#fff,#fff) padding-box, linear-gradient(135deg,#ffaa40,#9c40ff) border-box;
      box-shadow: 0 4px 40px rgba(0,0,0,0.04);
      
    }

    /* ===== Border Beam (fixed) (CSS only) ===== */
      position: absolute;
      inset: -2px;
      border-radius: 22px;
      padding: 2px;
      background: conic-gradient(from 0deg, transparent, #ffaa40, #9c40ff, transparent);
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      
      pointer-events: none;
    }
