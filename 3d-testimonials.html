<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3D Testimonials — demo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: #0a0a0f;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
    }

    .scene {
      position: relative;
      width: 100%;
      max-width: 800px;
      height: 450px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 12px;
      background: #0e0e16;
      perspective: 300px;
    }

    .scene-inner {
      display: flex;
      flex-direction: row;
      align-items: center;
      gap: 16px;
      transform: translateX(-100px) translateY(0px) translateZ(-100px) rotateX(20deg) rotateY(-10deg) rotateZ(20deg);
    }

    /* ===== Marquee Vertical ===== */
    .marquee-col {
      display: flex;
      flex-direction: column;
      gap: 12px;
      animation: marqueeDown 40s linear infinite;
      flex-shrink: 0;
    }
    .marquee-col--up {
      animation-direction: reverse;
    }
    .scene-inner:hover .marquee-col {
      animation-play-state: paused;
    }

    @keyframes marqueeDown {
      0% { transform: translateY(0); }
      100% { transform: translateY(-50%); }
    }

    /* ===== Card ===== */
    .t-card {
      width: 180px; flex-shrink: 0;
      background: linear-gradient(145deg, rgba(255,255,255,0.06), rgba(255,255,255,0.02));
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px;
      padding: 16px;
      transition: all .3s ease;
    }
    .t-card:hover {
      border-color: rgba(139,92,246,0.3);
      box-shadow: 0 4px 20px rgba(139,92,246,0.1);
    }

    .t-card__header {
      display: flex; align-items: center; gap: 10px;
    }
    .t-card__avatar {
      width: 36px; height: 36px; border-radius: 50%; overflow: hidden; flex-shrink: 0;
      background: linear-gradient(135deg, #0bc5ea, #8b5cf6);
    }
    .t-card__avatar img { width: 100%; height: 100%; object-fit: cover; }
    .t-card__avatar--fallback {
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; font-weight: 600; color: #fff;
    }
    .t-card__info { display: flex; flex-direction: column; }
    .t-card__name { font-size: 13px; font-weight: 600; color: #fff; display: flex; align-items: center; gap: 4px; }
    .t-card__country { font-size: 11px; }
    .t-card__username { font-size: 11px; color: rgba(255,255,255,0.4); font-weight: 500; }
    .t-card__body { margin-top: 10px; font-size: 12px; line-height: 1.5; color: rgba(255,255,255,0.65); }

    /* ===== Gradient overlays ===== */
    .fade-top {
      position: absolute; left: 0; right: 0; top: 0; height: 25%;
      background: linear-gradient(to bottom, #0e0e16, transparent);
      pointer-events: none; z-index: 2;
    }
    .fade-bottom {
      position: absolute; left: 0; right: 0; bottom: 0; height: 25%;
      background: linear-gradient(to top, #0e0e16, transparent);
      pointer-events: none; z-index: 2;
    }

    .title { position: absolute; top: 16px; left: 50%; transform: translateX(-50%); font-size: 13px; color: #555; z-index: 3; letter-spacing: 0.5px; }
  </style>
</head>
<body>

<div class="scene">
  <div class="title">3D Testimonials · 4 колонки</div>
  <div class="scene-inner" id="sceneInner"></div>
  <div class="fade-top"></div>
  <div class="fade-bottom"></div>
</div>

<script>
const testimonials = [
  { name: "Александр", body: "Недавно обратился в Galaxy Moto Service для ремонта своего скутера. Остался очень доволен качеством обслуживания. Скутер после ремонта едет отлично, никаких посторонних шумов. Рекомендую!", img: "https://randomuser.me/api/portraits/men/1.jpg" },
  { name: "Дарина", body: "Очень крутой сервис! Через них нашла себе Jilang Max. Было такое что аккумулятор перестал работать — приезжали ребята меня зажигать. Максимально рекомендую!", img: "https://randomuser.me/api/portraits/women/5.jpg" },
  { name: "Павел З.", body: "Заказал скутер с Калининграда, привезли в целости сохранности. Отличный сервис, всегда на связи. Приятная цена! Всем советую, не пожалеете.", img: "https://randomuser.me/api/portraits/men/8.jpg" },
  { name: "Рома С.", body: "Хороший мотосервис! Поставили дополнительный свет на скутер. Мастера помогли с выбором места, всё подключили грамотно. Результатом очень доволен!", img: "https://randomuser.me/api/portraits/men/12.jpg" },
  { name: "Эльвира", body: "Приезжала со своим Yamaha Vino, жаловалась что в горку еле ползёт. Настроили вариатор — сделали всё очень быстро. Теперь скутер летит, горки не замечает!", img: "https://randomuser.me/api/portraits/women/10.jpg" },
  { name: "Диана", body: "Отличное место! Купили мопед по выгодной цене, в идеальном состоянии. Ездим долго без поломок. У пацанов есть выездной сервис в случае чего.", img: "https://randomuser.me/api/portraits/women/15.jpg" },
  { name: "Иван Б.", body: "Приехал первый раз, встретили, проконсультировали. Всё сделали от души, без навязывания лишних услуг. Скутер освежили, едет как новый! Спасибо Денису!", img: "https://randomuser.me/api/portraits/men/20.jpg" },
  { name: "Ровшан З.", body: "Отличный сервис! Приехал на Honda Dio с убитым коленвалом. Ребята быстро всё разобрали, заменили. Теперь двигатель работает тихо, как новый.", img: "https://randomuser.me/api/portraits/men/22.jpg" },
  { name: "Глеб М.", body: "Отличный мотосервис! Приехал на настройку вариатора. Насколько быстрее стал ехать скутер после работы Дениса! Механик действительно знает своё дело!", img: "https://randomuser.me/api/portraits/men/25.jpg" },
  { name: "Наталья М.", body: "Быстро, качественно, с душой! Починили мопед за считанные часы. Как девушке мне было важно получить не только ремонт, но и понятные консультации — здесь это есть.", img: "https://randomuser.me/api/portraits/women/20.jpg" },
  { name: "Vadim L.", body: "Отличный мастер! Быстро качественно, без обмана!", img: "https://randomuser.me/api/portraits/men/30.jpg" },
  { name: "Алексей Н.", body: "Приезжал для планового ТО. Профессиональный подход и к клиенту и к технике. Обслуживаться буду только у них. Всем мотоциклистам советую!", img: "https://randomuser.me/api/portraits/men/33.jpg" },
  { name: "Антропов С.", body: "Приехал без записи с внезапной поломкой. Не отказали, быстро нашли запчасть и всё починили. Спасибо за человеческое отношение!", img: "https://randomuser.me/api/portraits/men/35.jpg" },
  { name: "Мария С.", body: "Проткнула колесо поздно вечером, позвонила. Мастер сразу смог подъехать, за что отдельное спасибо! Колесо поменяли, всё супер!", img: "https://randomuser.me/api/portraits/women/25.jpg" },
  { name: "Артур В.", body: "Парни хорошие, приятные, отзывчивые! Всё сделали как доктор прописал. Недорого, быстро, качественно. Рекомендую к посещению!", img: "https://randomuser.me/api/portraits/men/40.jpg" },
];

function cardHTML(t) {
  var initial = t.name.charAt(0);
  return '<div class="t-card">' +
    '<div class="t-card__header">' +
      '<div class="t-card__avatar">' +
        '<img src="' + t.img + '" alt="' + t.name + '" loading="lazy" onerror="this.parentNode.innerHTML=\'' + initial + '\';this.parentNode.className+=\' t-card__avatar--fallback\'">' +
      '</div>' +
      '<div class="t-card__info">' +
        '<div class="t-card__name">' + t.name + ' <span class="t-card__country">' + t.country + '</span></div>' +
        '<div class="t-card__username">' + t.username + '</div>' +
      '</div>' +
    '</div>' +
    '<div class="t-card__body">"' + t.body + '"</div>' +
  '</div>';
}

function init() {
  var inner = document.getElementById('sceneInner');
  var items = '';
  for (var i = 0; i < testimonials.length; i++) items += cardHTML(testimonials[i]);
  var itemsUp = '';
  for (var i = 0; i < testimonials.length; i++) itemsUp += cardHTML(testimonials[i]);

  // 4 колонки: вниз, вверх, вниз, вверх
  inner.innerHTML =
    '<div class="marquee-col">' + items + items + items + '</div>' +
    '<div class="marquee-col marquee-col--up">' + itemsUp + itemsUp + itemsUp + '</div>' +
    '<div class="marquee-col">' + items + items + items + '</div>' +
    '<div class="marquee-col marquee-col--up">' + itemsUp + itemsUp + itemsUp + '</div>';
}
init();
</script>

</body>
</html>
