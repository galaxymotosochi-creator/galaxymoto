<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>GALAXY MOTO</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Inter,sans-serif;color:#111}

/* ===== HERO ===== */
.hero{
  position:relative;
  min-height:100dvh;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  color:#fff;
  overflow:hidden;
  background:#0f0f1a;
}
.hero-bg{
  position:absolute;
  inset:0;
  z-index:0;
}
.hero-bg img{
  width:100%;
  height:100%;
  object-fit:cover;
}
.hero-overlay{
  position:absolute;
  inset:0;
  z-index:1;
  background:linear-gradient(to bottom,rgba(0,0,0,.45) 0%,rgba(0,0,0,.55) 100%);
}
.hero-content{
  position:relative;
  z-index:2;
  max-width:520px;
  width:100%;
  padding:0 20px;
}
.hero-badge{
  display:inline-flex;
  align-items:center;
  gap:6px;
  background:rgba(255,255,255,.12);
  backdrop-filter:blur(12px);
  border-radius:100px;
  padding:6px 16px 6px 6px;
  font-size:12px;
  font-weight:500;
  margin-bottom:20px;
  color:#fff;
}
.hero-badge-dot{
  width:8px;height:8px;
  border-radius:50%;
  background:#22c55e;
  display:inline-block;
}
.hero h1{
  font-size:32px;
  font-weight:800;
  line-height:1.15;
  margin-bottom:16px;
  text-shadow:0 2px 8px rgba(0,0,0,.5);
  white-space:pre-line;
}
@media(min-width:768px){.hero h1{font-size:42px}}
.hero-sub{
  font-size:15px;
  color:rgba(255,255,255,.85);
  margin-bottom:32px;
  line-height:1.5;
}
.hero-actions{
  display:flex;
  flex-direction:column;
  gap:10px;
  align-items:center;
  width:100%;
  max-width:320px;
  margin:0 auto;
}
@media(min-width:640px){.hero-actions{flex-direction:row;justify-content:center;max-width:100%}}
.hero-btn{
  width:100%;
  padding:14px 24px;
  border-radius:999px;
  font-size:14px;
  font-weight:600;
  font-family:Inter;
  cursor:pointer;
  transition:all .25s;
  border:none;
}
.hero-btn--primary{background:#fff;color:#111}
.hero-btn--primary:hover{background:#f0f0f0}
.hero-btn--outline{background:transparent;color:#fff;border:1.5px solid rgba(255,255,255,.5)}
.hero-btn--outline:hover{background:rgba(255,255,255,.08);border-color:#fff}
.hero-btn--gradient{background:linear-gradient(135deg,#0bc5ea,#8b5cf6);color:#fff;box-shadow:0 4px 20px rgba(11,197,234,.3),0 2px 8px rgba(139,92,246,.25)}
.hero-btn--gradient:hover{transform:translateY(-2px);box-shadow:0 6px 28px rgba(11,197,234,.4),0 4px 14px rgba(139,92,246,.35)}
.hero-scroll{
  position:absolute;
  bottom:24px;
  left:50%;
  transform:translateX(-50%);
  z-index:2;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:6px;
  color:#fff;
  opacity:.7;
}
.hero-scroll-text{font-size:10px;text-transform:uppercase;letter-spacing:.1em}
@media(max-width:1023px){.hero-scroll{display:none}}
@keyframes bounce{0%,20%,50%,80%,to{transform:translateY(0)}40%{transform:translateY(-8px)}60%{transform:translateY(-4px)}}
.hero-scroll-arrow svg{animation:bounce 2s infinite}

/* ===== КАТАЛОГ ===== */
.section{padding:32px 16px}
@media(max-width:767px){.section{padding:28px 16px}}
.section__header{text-align:center;margin-bottom:16px}
.section__title{font-size:18px;font-weight:700;color:#111;margin-bottom:4px}
.section__sub{font-size:14px;color:#888}

/* ===== КАРУСЕЛЬ ===== */
.car-wrap{max-width:480px;margin:0 auto;overflow:hidden}
.car-track{display:flex;transition:transform .4s cubic-bezier(.34,1.56,.64,1);padding:10px 0;gap:0}
.car-card{flex:0 0 72%;transition:all .4s;text-align:center;padding:0 3%}
.card{background:#fff;border-radius:16px;overflow:hidden;box-shadow:0 4px 20px rgba(0,0,0,.08);text-align:left}
.card-img{width:100%;aspect-ratio:4/3;object-fit:cover;display:block;background:#e8e8e8}
.card-body{padding:16px}
.card-title{font-size:16px;font-weight:700;margin-bottom:8px}
.card-specs{display:flex;flex-direction:column;gap:4px}
.card-spec{font-size:13px;display:flex;gap:4px}
.card-spec-l{color:#888}.card-spec-v{color:#111}
.card-foot{display:flex;align-items:center;justify-content:space-between;padding-top:8px;margin-top:4px;border-top:1px solid #f0f0f0}
.card-price{font-size:16px;font-weight:700;color:#111}
.card-btn{font-size:10px;font-weight:600;color:#fff;background:linear-gradient(135deg,#0bc5ea,#8b5cf6);border:none;border-radius:8px;padding:4px 14px;cursor:pointer;text-transform:uppercase;letter-spacing:.5px;font-family:Inter}
.car-arrow{padding:10px 22px;border:1.5px solid #ddd;border-radius:12px;background:#fff;font-size:18px;cursor:pointer;font-family:Inter;transition:background .2s}
.car-arrow:hover{background:#f8f8f8}
.car-nav{display:flex;justify-content:center;gap:12px;margin-top:14px}
</style>
</head>
<body>

<!-- ===== HERO ===== -->
<section class="hero">
  <div class="hero-overlay"></div>
  <div class="hero-bg">
    <img src="https://images.unsplash.com/photo-1558981806-ec527fa84c39?w=1200&h=800&fit=crop" alt="">
  </div>
  <div class="hero-content">
    <div class="hero-badge"><span class="hero-badge-dot"></span>Сочи · Работаем ежедневно</div>
    <h1>GALAXY MOTO<br>Полный цикл твоего движения</h1>
    <p class="hero-sub">Покупка, аренда, честный сервис и<br>оригинальные запчасти для мототехники.<br>Берем все заботы на себя</p>
    <div class="hero-actions">
      <button class="hero-btn hero-btn--primary">Выбрать технику</button>
      <button class="hero-btn hero-btn--outline">Взять в аренду</button>
      <button class="hero-btn hero-btn--gradient">Записаться на сервис</button>
    </div>
  </div>
  <div class="hero-scroll">
    <span class="hero-scroll-text">Листайте вниз</span>
    <div class="hero-scroll-arrow">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M12 5v14M19 12l-7 7-7-7"/>
      </svg>
    </div>
  </div>
</section>

<!-- ===== КАТАЛОГ ===== -->
<section class="section">
  <div class="section__header">
    <h2 class="section__title">Каталог техники</h2>
    <p class="section__sub">Выбирай технику под свой характер и задачи</p>
  </div>

  <div class="car-wrap">
    <div class="car-track" id="carTrack"></div>
    <div class="car-nav">
      <button class="car-arrow" onclick="carScroll(-1)">←</button>
      <button class="car-arrow" onclick="carScroll(1)">→</button>
    </div>
  </div>
</section>

<script>
// ===== Данные скутеров =====
var scooters = [
  {n:"Tank Next",p:"72 900",i:"images/tank-next.jpg",f:["Состояние: б/у","Пластик: без трещин","Технически: отличное","Пробег: 12000 км","Мощность: 150/49сс","Тип подачи: карбюратор","Охлаждение: воздушное","Макс. скорость: 100 км/ч","Колёса: 12/12"]},
  {n:"TANK X",p:"129 900",i:"images/tank-x.jpg",f:["Состояние: новый","Пробег: 0 км","Мощность: 175/49сс","Охлаждение: воздушное","Колёса: 13/13"]},
  {n:"N-MAX BAM-X",p:"169 900",i:"images/n-max-bam-x-1.jpg",f:["Состояние: б/у","Пробег: 2700 км","Мощность: 175/49сс","Охлаждение: водяное","Колёса: 13/13"]},
  {n:"MAXI / GALAXY",p:"65 900",i:"images/maxi-galaxy.jpg",f:["Состояние: б/у","Пластик: притёртости","Пробег: 13800 км","Мощность: 150/49сс","Охлаждение: воздушное","Колёса: 12/12"]},
  {n:"HONDA SUNDERO",p:"249 900",i:"images/honda-sundero-1.jpg",f:["Состояние: новая","Пробег: 0 км","Мощность: 150/49сс","Колёса: 10/10"]},
  {n:"TANK KUNHAO",p:"84 900",i:"images/tank-kunhao-1.jpg",f:["Состояние: б/у","Пластик: притёртости","Пробег: 1700 км","Мощность: 150/49сс","Охлаждение: воздушное","Колёса: 12/12"]},
  {n:"TANK KUNHAO",p:"72 900",i:"images/tank-kunhao2-1.jpg",f:["Состояние: б/у","Пластик: без трещин","Технически: после ремонта","Пробег: 17000 км","Мощность: 150/49сс","Охлаждение: воздушное","Колёса: 12/12"]},
  {n:"ADV BAM-X",p:"149 900",i:"images/adv-bam-x-1.jpg",f:["Состояние: новый","Пробег: 0 км","Мощность: 175/49сс","Колёса: 14/14"]},
  {n:"GUSITE AGV-R",p:"194 900",i:"images/gusite-agv-r-1.jpg",f:["Состояние: новый","Пробег: 0 км","Мощность: 200/49сс","Макс.скорость: 110 км/ч","Колёса: 13/14"]}
];

// ===== Рендер карусели =====
var pos=0;
(function(){
  var track = document.getElementById('carTrack');
  if(!track)return;
  var h = '';
  scooters.forEach(function(s,i){
    var d=i-pos;var a=Math.abs(d);var sc=a==0?1:.82;var op=a==0?1:.5;
    h += '<div class="car-card" style="transform:scale('+sc+');opacity:'+op+'"><div class="card"><img class="card-img" src="' + s.i + '" alt="' + s.n + '"><div class="card-body"><div class="card-title">' + s.n + '</div><div class="card-specs">';
    s.f.forEach(function(sp){
      var p = sp.split(': ');
      if(p.length > 1) h += '<div class="card-spec"><span class="card-spec-l">' + p[0] + ': </span><span class="card-spec-v">' + p[1] + '</span></div>';
    });
    h += '</div><div class="card-foot"><span class="card-price">' + s.p + ' ₽</span><button class="card-btn">Тест-драйв</button></div></div></div></div>';
  });
  track.innerHTML = h;
})();

// ===== Навигация =====
function up(){
  var track = document.getElementById('carTrack');
  if(!track)return;
  var items = track.querySelectorAll('.car-card');
  items.forEach(function(el,i){
    var d = i - pos;
    var a = Math.abs(d);
    el.style.transform = 'scale(' + (a==0?1:.82) + ')';
    el.style.opacity = a==0?1:.5;
  });
  track.style.transform = 'translateX(' + (-pos*72) + '%)';
}
function carScroll(dir){
  pos += dir;
  if(pos<0) pos = scooters.length-1;
  if(pos>=scooters.length) pos = 0;
  up();
}
</script>

</body>
</html>
