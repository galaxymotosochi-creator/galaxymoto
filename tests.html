<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1">
<title>GALAXY MOTO — Тесты для сотрудников</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Inter,sans-serif;background:#f5f5f5;color:#111;min-height:100vh}
.P{max-width:900px;margin:0 auto;padding:20px 16px 40px}
.H{background:#111;color:#fff;padding:6px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:8px;z-index:100;border-radius:12px;max-width:936px;margin:0 auto 16px}
.H h1{font-size:18px;font-weight:700;display:flex;align-items:center;gap:8px}
.H h1 .L{width:28px;height:28px;border-radius:6px;background:linear-gradient(135deg,#0bc5ea,#8b5cf6);display:flex;align-items:center;justify-content:center;font-size:14px;color:#fff;font-weight:800}
.HA{display:flex;gap:8px;align-items:center}
.HA a{color:#999;text-decoration:none;font-size:13px;font-weight:500;cursor:pointer}
.HA a:hover{color:#fff}
.HR{background:linear-gradient(135deg,#111,#1a1a2e);border-radius:16px;padding:28px 24px;color:#fff;margin-bottom:24px}
.HR h2{font-size:22px;font-weight:800;margin-bottom:4px}
.HR p{font-size:14px;color:rgba(255,255,255,.65)}
.HR .S{display:flex;gap:20px;margin-top:14px;flex-wrap:wrap}
.HR .S span{font-size:12px;color:rgba(255,255,255,.5)}
.HR .S span strong{color:#fff;font-size:15px}
.TG{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:12px;margin-bottom:20px}
.TC{background:#fff;border-radius:14px;padding:20px;cursor:pointer;transition:all .2s;border:1px solid transparent;position:relative}
.TC:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(0,0,0,.08);border-color:#e0e0e0}
.TC .ic{font-size:32px;margin-bottom:10px;display:block}
.TC h3{font-size:16px;font-weight:700;margin-bottom:4px}
.TC .de{font-size:13px;color:#888;line-height:1.4;margin-bottom:10px}
.TC .me{display:flex;gap:10px;font-size:11px;color:#aaa;font-weight:500;flex-wrap:wrap}
.TC .me span{display:flex;align-items:center;gap:3px}
.TC .bg{position:absolute;top:10px;right:12px;font-size:10px;font-weight:700;padding:2px 8px;border-radius:6px;background:#f0f0f0;color:#888}
.TC .bg.g{background:#e8f5e9;color:#2e7d32}
.QS{display:none}
.QH{display:flex;align-items:center;gap:12px;margin-bottom:16px}
.QH .bb{width:36px;height:36px;border-radius:10px;border:1px solid #ddd;background:#fff;color:#333;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.QH .bb:hover{background:#f0f0f0}
.QH .qt{font-size:17px;font-weight:700;flex:1}
.QH .qp{font-size:13px;color:#888;font-weight:500}
.PB{height:4px;background:#e0e0e0;border-radius:4px;margin-bottom:20px;overflow:hidden}
.PB .fl{height:100%;background:linear-gradient(90deg,#0bc5ea,#8b5cf6);transition:width .3s ease}
.QC{background:#fff;border-radius:16px;padding:24px;margin-bottom:12px}
.QC .qn{font-size:12px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.QC .qt2{font-size:17px;font-weight:600;line-height:1.4;margin-bottom:18px}
.OP{display:flex;flex-direction:column;gap:8px}
.OI{display:flex;align-items:center;gap:12px;padding:12px 16px;border-radius:12px;border:1px solid #e0e0e0;cursor:pointer;transition:all .12s;font-size:14px;line-height:1.4}
.OI:hover{border-color:#999;background:#fafafa}
.OI.s{border-color:#111;background:#f5f5f5}
.OI.s .rd{background:#111;border-color:#111}.OI.s .rd:after{transform:scale(1)}
.OI.ok{border-color:#2e7d32;background:#e8f5e9}
.OI.ok .rd{background:#2e7d32;border-color:#2e7d32}
.OI.ko{border-color:#c62828;background:#ffebee}
.OI.ko .rd{background:#c62828;border-color:#c62828}
.OI .rd{width:20px;height:20px;border-radius:50%;border:2px solid #ccc;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.OI .rd:after{content:"";width:8px;height:8px;border-radius:50%;background:#fff;transform:scale(0);transition:transform .12s}
.OI .ol{flex:1}
.QA{display:flex;gap:10px;margin-top:16px}
.QA button{padding:12px 24px;border-radius:12px;font-size:14px;font-weight:600;font-family:Inter,sans-serif;cursor:pointer;border:none}
.QA .nb{background:#111;color:#fff;flex:1}.QA .nb:hover{background:#333}
.QA .nb:disabled{background:#ccc;cursor:not-allowed}
.RS{display:none}
.RC{background:#fff;border-radius:16px;padding:32px 24px;text-align:center;margin-bottom:16px}
.RC .em{font-size:48px;margin-bottom:8px}
.RC h2{font-size:22px;font-weight:800;margin-bottom:4px}
.RC .sc{font-size:48px;font-weight:800;margin:10px 0;background:linear-gradient(135deg,#0bc5ea,#8b5cf6);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.RC .dt{font-size:14px;color:#888;line-height:1.6}
.RC .dt strong{color:#111}
.RD{background:#fff;border-radius:14px;padding:20px;margin-bottom:16px}
.RD h3{font-size:14px;font-weight:700;margin-bottom:12px}
.RI{display:flex;align-items:flex-start;gap:10px;padding:8px 0;border-bottom:1px solid #f0f0f0;font-size:13px}
.RI:last-child{border-bottom:none}
.RI .ri{font-size:16px;margin-top:2px;flex-shrink:0}
.RI .rq{flex:1;color:#555}.RI .ra{font-weight:600;color:#111;margin-top:2px;font-size:12px}
.RI.ok .ri{color:#2e7d32}.RI.ko .ri{color:#c62828}
.RA{display:flex;gap:10px;margin-top:16px}
.RA button{flex:1;padding:12px;border-radius:12px;font-size:14px;font-weight:600;font-family:Inter,sans-serif;cursor:pointer;border:none}
.RA .rt{border:1px solid #ddd;background:#fff;color:#111}
.RA .rt:hover{background:#f5f5f5}
.NP{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;justify-content:center;align-items:center;padding:16px}
.NP.a{display:flex}
.NB{background:#fff;max-width:360px;width:100%;border-radius:16px;padding:24px;text-align:center}
.NB h3{font-size:18px;font-weight:700;margin-bottom:4px}
.NB p{font-size:13px;color:#888;margin-bottom:16px}
.NB input{width:100%;padding:12px 14px;font-size:16px;font-family:Inter,sans-serif;border:1px solid #ddd;border-radius:10px;outline:none;margin-bottom:8px}
.NB input:focus{border-color:#111}
.NB .ne{font-size:12px;color:#c62828;display:none;margin-bottom:8px}
.NB .nb2{width:100%;padding:12px;border-radius:10px;font-size:15px;font-weight:600;font-family:Inter,sans-serif;background:#111;color:#fff;border:none;cursor:pointer}
.NB .nb2:hover{background:#333}
.LB{background:#fff;border-radius:14px;border:1px solid #eee;overflow:hidden;margin-bottom:20px;display:none}
.LB h3{font-size:14px;font-weight:700;padding:14px 16px;border-bottom:1px solid #f0f0f0}
.LB table{width:100%;border-collapse:collapse;font-size:13px}
.LB td{padding:8px 14px;border-bottom:1px solid #f5f5f5}.LB tr:last-child td{border-bottom:none}
@media(max-width:640px){
.P{padding:12px 10px 30px}.H h1{font-size:16px}.TG{grid-template-columns:1fr;gap:10px}
.HR{padding:20px 16px}.HR h2{font-size:18px}.QC{padding:16px}.QC .qt2{font-size:15px}.RC .sc{font-size:36px}
}
</style>
</head>
<body>
<div class="P" id="app">
<div class="H"><h1><span class="L">GM</span> GALAXY MOTO</h1><div class="HA"><a onclick="sl()">📋 Тесты</a><a onclick="sb()">🏆 Рейтинг</a></div></div>
<div class="HR"><h2>🧠 Проверь свои знания!</h2><p>Тесты для сотрудников. Отвечай, набирай баллы!</p><div class="S"><span>Тестов: <strong id="tt">0</strong></span><span>Вопросов: <strong id="tq">0</strong></span></div></div>
<div id="ls"><div class="TG" id="tg"></div></div>
<div id="qs" class="QS"><div class="QH"><button class="bb" onclick="eq()">←</button><span class="qt" id="qti"></span><span class="qp" id="qpr"></span></div><div class="PB"><div class="fl" id="pf"></div></div><div id="qa"></div><div class="QA"><button class="nb" id="nb" onclick="nn()" disabled>Далее →</button></div></div>
<div class="RS" id="rs"><div class="RC" id="rc"></div><div class="RD" id="rd"></div><div class="RA"><button class="rt" onclick="st(ci)">🔄 Ещё раз</button><button class="rt" onclick="sl()">📋 К тестам</button></div></div>
<div class="LB" id="lb"><h3>🏆 Рейтинг сотрудников</h3><div id="lbc"><p style="text-align:center;padding:20px;color:#888;font-size:13px">Загрузка...</p></div></div>
<div class="NP" id="np"><div class="NB"><h3>👋 Привет!</h3><p>Введи своё имя, чтобы начать тест</p><input type="text" id="ni" placeholder="Твоё имя" maxlength="30" onkeydown="if(event.key==='Enter')cn()"><div class="ne" id="ne">Введи имя</div><button class="nb2" onclick="cn()">Начать тест</button></div></div>
</div>
<script>
var TD=[{"id": "m", "icon": "🚵", "title": "Модели скутеров", "desc": "Характеристики и цены", "diff": "e", "q": [{"q": "Сколько кубов у Galaxy S1?", "o": ["49.9 см³", "125 см³", "150 см³"], "c": 0}, {"q": "Двигатель Galaxy V11?", "o": ["125", "150", "200"], "c": 1}, {"q": "Макс скорость X7?", "o": ["80", "95", "110"], "c": 1}, {"q": "Цвет R1 популярный?", "o": ["Белый", "Чёрный мат", "Красный"], "c": 1}, {"q": "Мест на X7?", "o": ["1", "2", "3"], "c": 1}, {"q": "Багажник V11?", "o": ["15 л", "25 л", "35 л"], "c": 1}, {"q": "Вес S1?", "o": ["75", "90", "110"], "c": 1}, {"q": "Расход X7?", "o": ["2 л", "3 л", "4 л"], "c": 1}]}, {"id": "s", "icon": "🔧", "title": "Сервис и ТО", "desc": "Обслуживание", "diff": "m", "q": [{"q": "Какое масло?", "o": ["10W-40", "5W-30", "SAE 30"], "c": 0}, {"q": "Замена масла?", "o": ["500", "1000", "3000"], "c": 1}, {"q": "Тормозной путь V11?", "o": ["10", "16", "25"], "c": 1}, {"q": "ТО S1 стоит?", "o": ["1500", "2500", "4000"], "c": 1}, {"q": "Цепь на X7?", "o": ["O-Ring", "X-Ring", "Ролик"], "c": 0}, {"q": "Ремень вариатора?", "o": ["3000", "6000", "10000"], "c": 1}, {"q": "Аккумулятор V11?", "o": ["5Ah", "7Ah", "9Ah"], "c": 1}, {"q": "Давление шин?", "o": ["1.5", "2.0", "2.5"], "c": 1}]}, {"id": "r", "icon": "📋", "title": "Правила аренды", "desc": "Документы", "diff": "m", "q": [{"q": "Документы на аренду?", "o": ["Паспорт+права", "Паспорт", "Права"], "c": 0}, {"q": "Залог S1?", "o": ["5000", "10000", "15000"], "c": 1}, {"q": "Аренда X7/сутки?", "o": ["1500", "2000", "3000"], "c": 1}, {"q": "Скидка на 3 дня?", "o": ["5%", "10%", "15%"], "c": 1}, {"q": "Возраст аренды?", "o": ["16+", "18+", "21+"], "c": 1}, {"q": "ДТП на аренде?", "o": ["Уехать", "Звонить", "Скрыть"], "c": 1}, {"q": "Выезд за город?", "o": ["Да", "Только Сочи", "По согласованию"], "c": 2}, {"q": "Что входит?", "o": ["Только скутер", "+шлем", "+шлем+страховка"], "c": 2}]}, {"id": "p", "icon": "💼", "title": "Продажи", "desc": "Гарантия", "diff": "h", "q": [{"q": "Гарантия на новый?", "o": ["6 мес", "1 год", "2 года"], "c": 1}, {"q": "Комиссия сервиса?", "o": ["5%", "10%", "15%"], "c": 1}, {"q": "Предпродажка?", "o": ["Мойка", "Полное ТО", "Масло"], "c": 1}, {"q": "Средний чек?", "o": ["30к", "60к", "100к"], "c": 1}, {"q": "Рассрочка?", "o": ["3 мес", "6 мес", "12 мес"], "c": 1}, {"q": "Видео-обзор?", "o": ["Нет", "Да", "По желанию"], "c": 1}, {"q": "Документы?", "o": ["ПТС", "ПТС+ДКП", "Договор"], "c": 1}, {"q": "Валюта?", "o": ["Рубли", "Рубли+USDT", "Любая"], "c": 0}]}, {"id": "x", "icon": "🏠", "title": "Внутренние правила", "desc": "Режим", "diff": "e", "q": [{"q": "Открытие?", "o": ["8:00", "9:00", "10:00"], "c": 1}, {"q": "Выходной?", "o": ["Пн", "Вс", "Нет"], "c": 2}, {"q": "Телефон?", "o": ["8-900-000-80-23", "8-988-000-00-00", "8-900-000-10-10"], "c": 0}, {"q": "Возврат?", "o": ["7 дней", "14 дней", "При браке"], "c": 1}, {"q": "Запись заявок?", "o": ["Блокнот", "На сайте", "Запомнить"], "c": 1}, {"q": "Курить?", "o": ["Да", "На улице", "В комнате"], "c": 1}, {"q": "Одежда?", "o": ["Любая", "Опрятно с лого", "Костюм"], "c": 1}, {"q": "Встреча клиента?", "o": ["Кивнуть", "Встать улыбнуться", "Крикнуть"], "c": 1}]}, {"id": "y", "icon": "🚑", "title": "Безопасность", "desc": "Экстренные ситуации", "diff": "h", "q": [{"q": "Пожар?", "o": ["Тушить", "Эвакуация+112", "Спрятаться"], "c": 1}, {"q": "Где огнетушитель?", "o": ["Подсобка", "У входа слева", "2 этаж"], "c": 1}, {"q": "Номер спасения?", "o": ["102", "103", "112"], "c": 2}, {"q": "Агрессивный клиент?", "o": ["Спорить", "Позвать рук-ля", "Полиция"], "c": 1}, {"q": "Тест без шлема?", "o": ["Можно", "Никогда", "Во дворе"], "c": 1}, {"q": "Утечка топлива?", "o": ["Ничего", "Перекрыть+проветрить", "Вытереть"], "c": 1}, {"q": "Травма?", "o": ["Никуда", "Руководителю", "112"], "c": 1}, {"q": "Аптечек?", "o": ["1", "2", "Не обязательно"], "c": 1}]}];
var ci = null, cq = 0, ans = [], un = '';

function sl() { show('ls'); hideAll(['qs','rs','lb']); }
function sb() { show('lb'); hideAll(['ls','qs','rs']); loadLB(); }
function hideAll(ids) { ids.forEach(function(i){document.getElementById(i).style.display='none';}); }
function show(id) { document.getElementById(id).style.display='block'; }

function init() {
  document.getElementById('tt').textContent = TD.length;
  document.getElementById('tq').textContent = TD.reduce(function(s,t){return s+t.q.length;},0);
  render();
  un = localStorage.getItem('gm_un') || '';
  if (!un) document.getElementById('np').classList.add('a');
}

function cn() {
  var n = document.getElementById('ni').value.trim();
  if (!n) { document.getElementById('ne').style.display='block'; return; }
  document.getElementById('ne').style.display='none';
  un = n;
  localStorage.setItem('gm_un', un);
  document.getElementById('np').classList.remove('a');
}

function render() {
  var diffs = {'e':'⭐ Лёгкий','m':'⭐⭐ Средний','h':'⭐⭐⭐ Сложный'};
  var cls = {'e':'de','m':'dm','h':'dh'};
  var h = '';
  TD.forEach(function(t) {
    var best = getBest(t.id);
    var bg = best !== null ? '<span class="bg g">✅ '+best+'%</span>' : '<span class="bg">'+t.q.length+' вопр.</span>';
    h += '<div class="TC" onclick="st(\''+t.id+'\')">' +
      '<span class="ic">'+t.icon+'</span><h3>'+t.title+'</h3>' +
      '<div class="de">'+t.desc+'</div>' +
      '<div class="me"><span>📝 '+t.q.length+' вопросов</span></div>' +
      bg + '</div>';
  });
  document.getElementById('tg').innerHTML = h;
}

function getBest(id) {
  try {
    var d = JSON.parse(localStorage.getItem('gm_rs') || '{}');
    if (d[id] && d[id].length > 0) {
      var b = 0; d[id].forEach(function(r){if(r.s>b)b=r.s;});
      return b;
    }
    return null;
  } catch(e){return null;}
}

function st(id) {
  if (!un) { document.getElementById('np').classList.add('a'); return; }
  var t = TD.find(function(x){return x.id===id;});
  if (!t) return;
  ci = id; cq = 0; ans = [];
  hideAll(['ls','lb','rs']);
  document.getElementById('qs').style.display='block';
  document.getElementById('qti').textContent = t.icon + ' ' + t.title;
  rq();
}

function rq() {
  var t = TD.find(function(x){return x.id===ci;});
  var q = t.q[cq];
  document.getElementById('qpr').textContent = (cq+1)+' из '+t.q.length;
  document.getElementById('pf').style.width = ((cq+1)/t.q.length*100)+'%';
  var h = '<div class="QC"><div class="qn">ВОПРОС '+(cq+1)+'</div><div class="qt2">'+q.q+'</div><div class="OP">';
  q.o.forEach(function(o,i) {
    h += '<div class="OI" data-idx="'+i+'" onclick="sel(this)"><div class="rd"></div><span class="ol">'+o+'</span></div>';
  });
  h += '</div></div>';
  document.getElementById('qa').innerHTML = h;
  document.getElementById('nb').disabled = true;
  document.getElementById('nb').textContent = cq+1 >= t.q.length ? '🎉 Результат' : 'Далее →';
}

function sel(el) {
  var p = el.parentElement;
  if (p.querySelector('.OI.ok') || p.querySelector('.OI.ko')) return;
  p.querySelectorAll('.OI').forEach(function(o){o.classList.remove('s');});
  el.classList.add('s');
  document.getElementById('nb').disabled = false;
}

function nn() {
  var sel = document.querySelector('.OI.s');
  if (!sel) return;
  var idx = parseInt(sel.dataset.idx);
  var t = TD.find(function(x){return x.id===ci;});
  var q = t.q[cq];
  var ok = idx === q.c;
  ans.push({q:q.q, s:q.o[idx], ok:ok, ca:q.o[q.c]});
  sel.classList.remove('s');
  if (ok) sel.classList.add('ok');
  else {
    sel.classList.add('ko');
    document.querySelectorAll('.OI')[q.c].classList.add('ok');
  }
  document.querySelectorAll('.OI').forEach(function(o){o.style.pointerEvents='none';});
  cq++;
  if (cq >= t.q.length) { setTimeout(sr, 500); }
  else { setTimeout(rq, 500); }
}

function sr() {
  hideAll(['ls','qs','lb']);
  document.getElementById('rs').style.display='block';
  var ok = ans.filter(function(a){return a.ok;}).length;
  var pct = Math.round(ok/ans.length*100);
  var em = pct>=80?'🏆':pct>=50?'👍':'💪';
  var msg = pct>=80?'Отлично! Ты знаешь своё дело!':pct>=50?'Неплохо! Есть куда расти!':'Попробуй ещё раз!';
  document.getElementById('rc').innerHTML = '<div class="em">'+em+'</div><h2>'+msg+'</h2><div class="sc">'+pct+'%</div><div class="dt">Правильно: <strong>'+ok+'</strong> из <strong>'+ans.length+'</strong></div>';
  var h = '<h3>📋 Разбор вопросов</h3>';
  ans.forEach(function(a,i){
    h += '<div class="RI '+(a.ok?'ok':'ko')+'"><span class="ri">'+(a.ok?'✅':'❌')+'</span><div><div class="rq">'+(i+1)+'. '+a.q+'</div><div class="ra">'+(a.ok?'✔ '+a.s:'✘ '+a.s+' — Правильно: '+a.ca)+'</div></div></div>';
  });
  document.getElementById('rd').innerHTML = h;
  saveR(ci, pct);
}

function saveR(id, pct) {
  try {
    var d = JSON.parse(localStorage.getItem('gm_rs') || '{}');
    if (!d[id]) d[id] = [];
    d[id].push({u:un, s:pct, d:new Date().toLocaleDateString('ru-RU')});
    localStorage.setItem('gm_rs', JSON.stringify(d));
  } catch(e){}
}

function eq() { sl(); ci=null; }

function loadLB() {
  try {
    var all = JSON.parse(localStorage.getItem('gm_rs') || '{}');
    var rows = [];
    Object.keys(all).forEach(function(tid) {
      all[tid].forEach(function(r) {
        rows.push({u:r.u, s:r.s, t:tid, d:r.d});
      });
    });
    // Aggregate by user - best scores
    var byUser = {};
    rows.forEach(function(r) {
      if (!byUser[r.u]) byUser[r.u] = {total:0, count:0, best:[]};
      byUser[r.u].total += r.s;
      byUser[r.u].count++;
      byUser[r.u].best.push(r.s);
    });
    var sorted = Object.keys(byUser).map(function(u){
      var b = byUser[u].best.sort(function(a,b){return b-a;});
      return {u:u, avg:Math.round(byUser[u].total/byUser[u].count), cnt:byUser[u].count, best:b[0]};
    }).sort(function(a,b){return b.avg-a.avg;});
    var h = '<table><tr><td>#</td><td>Имя</td><td>Среднее</td><td>Тестов</td><td>Лучший</td></tr>';
    sorted.forEach(function(r,i){
      var cls = i===0?' class="gold"':i===1?' class="silver"':i===2?' class="bronze"':'';
      h += '<tr><td class="rank'+cls+'">'+(i+1)+'</td><td class="name">'+r.u+'</td><td class="score-val">'+r.avg+'%</td><td>'+r.cnt+'</td><td class="score-val">'+r.best+'%</td></tr>';
    });
    if (!sorted.length) h = '<p style="text-align:center;padding:20px;color:#888;font-size:13px">Пока никто не прошёл тесты</p>';
    else h += '</table>';
    document.getElementById('lbc').innerHTML = h;
  } catch(e){document.getElementById('lbc').innerHTML = '<p style="text-align:center;padding:20px;color:#888;font-size:13px">Ошибка загрузки</p>';}
}

init();
</script>
</body>
</html>
