      if (step === 0) return calcWinter;
      if (step === 1) return calcInterior;
      return [];
    }

    function toggleOption(id) {
      var opts = getStepOptions(calcStep);
      for (var i = 0; i < opts.length; i++) {
        if (opts[i].id === id) {
          opts[i].on = !opts[i].on;
          break;
        }
      }
      renderCalc();
    }

    function openCalc(name, price, area) { if(name){calcModel.name=name;calcModel.basePrice=price||calcModel.basePrice;calcModel.area=area||calcModel.area} document.getElementById('calcOverlay').classList.add('active'); renderCalc(); }
    function closeCalc() { document.getElementById('calcOverlay').classList.remove('active'); }

    function getTotalOptions() {
      var total = 0;
      var steps = [calcWinter, calcInterior];
      for (var s = 0; s < steps.length; s++) {
        for (var i = 0; i < steps[s].length; i++) {
          if (steps[s][i].on) total += steps[s][i].price;
        }
      }
      return total;
    }

    function getTaxBase() {
      return calcModel.basePrice + getTotalOptions() + calcChinaDelivery;
    }

    function getRussiaDelivery() {
      if (calcSelectedCity && calcDist[calcSelectedCity]) {
        return 120 * calcDist[calcSelectedCity];
      }
      return 0;
    }

    function getTaxAmount() {
      return Math.round(getTaxBase() * calcTaxRate);
    }

    function getGrandTotal() {
      return calcModel.basePrice + getTotalOptions() + calcChinaDelivery + getRussiaDelivery() + getTaxAmount();

        s.classList.toggle('active', i === calcStep);

      });
      if (calcStep === 0) renderStep0();
      else if (calcStep === 1) renderStep1();
      else if (calcStep === 2) renderStep2();
      else if (calcStep === 3) renderStep3();
      document.getElementById('calcPrev').disabled = calcStep === 0;
      document.getElementById('calcNext').textContent = calcStep === 3 ? 'Готово' : 'Далее';

    function submitLead(type) {
      var phone = document.getElementById('leadPhone').value.trim();

      if (!phone || !contact) {
        alert('Заполните телефон и выберите способ связи');
        return;
      }
      
      var budget = '';
      if (type === 'cheaper') {
        budget = document.getElementById('leadBudget').value.trim();
      }
      
      // Читаем реферальный код
      var refCode = localStorage.getItem('galaxy_referral_code');
      var agentId = refCode || '';
      
      // Генерируем ID заявки
      var leadId = Date.now().toString(36) + Math.random().toString(36).substr(2,9);
      
      // Собираем опции
      var selectedOptions = [];
      var allOpts = [calcWinter, calcInterior];
      for (var s = 0; s < allOpts.length; s++) {
        for (var i = 0; i < allOpts[s].length; i++) {
          if (allOpts[s][i].on) selectedOptions.push(allOpts[s][i].label);
        }
      }
      
      // Данные заявки
      var leadData = {
        name: 'Заявка с калькулятора',
        phone: phone,
        visitorId: localStorage.getItem('galaxy_visitor_id') || '',
        city: calcSelectedCity || '',
        houseName: calcModel.name,
        houseCount: '1',
        budgetPerHouse: String(getGrandTotal()),
        source: 'calculator',
        agentId: agentId,
        contactMethod: contact,
        budget: budget,
        expectation: type === 'match' ? 'Совпали' : 'Дешевле',
        selectedOptions: selectedOptions,
        deliveryCity: calcSelectedCity,
        totalPrice: getGrandTotal(),
        status: 'new',
        createdAt: new Date().toISOString()
      };
      
      var btn = document.getElementById('leadSubmitBtn');
      if (btn) { btn.textContent = 'Отправка...'; btn.disabled = true; }
      
      // Сохраняем в Firestore через API
      fetch('/api/leads/' + leadId, {
        method: 'PUT',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(leadData)
      })

        document.getElementById('calcBody').innerHTML = '<p style="text-align:center;color:#000;font-size:16px;font-weight:600;padding:50px 20px;line-height:1.7;margin:0">Спасибо!<br><span style="font-size:14px;font-weight:400;color:#666">Мы свяжемся с Вами в ближайшее время</span></p>';

    <!-- Hero Video — только на главной, безрывный loop -->
    <script>
    (function(){
      if (!vw || !video) return;
      var rAF = null;
      var FADE_MS = 250;
      var wasOnHome = false;  // чтобы не дёргать без необходимости
      var posterWasHidden = false;

      // Seamless loop — безрывный! без задержек и серых экранов
      function onEnded() {
        video.currentTime = 0;
        video.play().catch(function(){});
      }

      function showOnHome() {
        var hero = document.querySelector('.hero');
        var onHome = !!hero;
        if (onHome === wasOnHome) return;
        wasOnHome = onHome;
        if (onHome) {
          vw.style.display = 'block';
          ov.style.display = 'block';
          if (poster && !posterWasHidden) {
            poster.style.opacity = '1';
          }
          if (video.paused) {
            video.style.opacity = '0';
            video.play().catch(function(){});
          }
          fadeInVideo();
        } else {
          vw.style.display = 'none';
          ov.style.display = 'none';
        }
      }

      video.addEventListener('ended', onEnded);
      video.loop = false;

      // Плавный фейд видео поверх постера
      function fadeInVideo() {
        function showVideo() {
          video.style.opacity = '1';
          if (poster && !posterWasHidden) {
            posterWasHidden = true;
            setTimeout(function(){ poster.style.opacity = '0'; }, 100);
          }
        }
        if (video.readyState >= 3 || video.currentTime > 0) {
          showVideo();
        } else {
          video.addEventListener('canplay', function onCan() {
            showVideo();
            video.removeEventListener('canplay', onCan);
          }, { once: true });
        }
      }

      // Первый запуск
      setTimeout(function(){ showOnHome(); }, 50);
      fadeInVideo();

      // Следим за появлением/исчезновением hero (React рендерит его только на главной)
      var mo = new MutationObserver(showOnHome);
      var root = document.getElementById('root');
      if (root) {
        mo.observe(root, { childList: true, subtree: true });
      }

      video.load();
    })();
    </script>

    <script>
      var _galleryImages = [];
      var _galleryIndex = 0;

      document.body.addEventListener('click', function(e) {
        var img = e.target.closest('.house-card img, .house-card__image img');
        if (!img) return;
        if (img.closest('.gallery-arrow')) return;
        e.preventDefault();
        var container = img.parentNode;
        var imgs = container.querySelectorAll('img');
        _galleryImages = [];
        imgs.forEach(function(m) { _galleryImages.push(m.src); });
        _galleryIndex = Array.prototype.indexOf.call(imgs, img);
        openGallery();
      });

      function openGallery() {
        if (_galleryImages.length === 0) return;
        showGalleryImage();
        document.getElementById('galleryOverlay').classList.add('gallery-overlay--open');
        document.body.style.overflow = 'hidden';
      }

      function closeGallery(e) {
        if (e && e.target !== e.currentTarget) return;
        document.getElementById('galleryOverlay').classList.remove('gallery-overlay--open');
        document.body.style.overflow = '';
      }

      function galleryNav(dir) {
        _galleryIndex = (_galleryIndex + dir + _galleryImages.length) % _galleryImages.length;
        showGalleryImage();
      }

      function showGalleryImage() {
        document.getElementById('galleryImg').src = _galleryImages[_galleryIndex];
        document.getElementById('galleryCounter').textContent = (_galleryIndex + 1) + ' / ' + _galleryImages.length;
      }

      document.addEventListener('keydown', function(e) {
        if (!document.getElementById('galleryOverlay').classList.contains('gallery-overlay--open')) return;
        if (e.key === 'Escape') { closeGallery(); }
        if (e.key === 'ArrowLeft') { galleryNav(-1); }
        if (e.key === 'ArrowRight') { galleryNav(1); }
      });
    </script>

  <script>
    // Patch referral link display with short code
    function patchReferralCode() {
      var code = localStorage.getItem('galaxy_ref_code');
      if (!code) return;
      var inputs = document.querySelectorAll('.referral-link__input');
      inputs.forEach(function(inp) {
        if (inp.value && inp.value.indexOf('ref=') > 0) {
          inp.value = window.location.origin + window.location.pathname + '#/?r=' + code;
        }
      });
    }
    setInterval(patchReferralCode, 1000);
    setTimeout(patchReferralCode, 500);

    (function() {
      var ready = false;
      function firebaseReady() {
        if (ready) return true;
        ready = typeof firebase !== 'undefined' && firebase.apps && firebase.apps.length > 0;
        return ready;
      }

      // Save lead to Firestore when submitted
      function saveLeadToFirestore(data) {
        if (!firebaseReady()) return;
        var ref = sessionStorage.getItem('ref_code') 
               || new URLSearchParams(window.location.hash.split('?')[1]||window.location.search).get('ref') 
               || new URLSearchParams(window.location.hash.split('?')[1]||window.location.search).get('r');
        
        // Try to resolve short code to email
        function doSave(agentEmail) {
          data.agentId = agentEmail;
          data.firebaseSaved = true;
          data.createdAt = new Date().toISOString();
          db.collection('leads').doc(data.id || data.phone + '_' + Date.now()).set(data)
            .then(function() { console.log('Lead saved to Firestore for agent:', agentEmail); })
            .catch(function(e) { console.error('Firestore save error:', e); });
        }

        if (ref) {
          if (ref.indexOf('@') > 0) {
            doSave(ref);
          } else {
            db.collection('referrals').doc(ref).get().then(function(d) {
              if (d.exists) doSave(d.data().email);
              else console.log('Referral code not found:', ref);
            }).catch(function(e) { console.error('Referral lookup error:', e); });
          }
        }
      }

      // Load leads for agent dashboard
      function loadAgentLeads(email) {
        if (!email || !firebaseReady()) return;
        localStorage.setItem('galaxy_user_refcode', email);
        
        // Get referral code
        db.collection('referrals').where('email', '==', email).get().then(function(snap) {
          snap.forEach(function(d) { 
            localStorage.setItem('galaxy_ref_code', d.id);
            patchReferralCode();
          });
        });

        // Pull leads from Firestore
        db.collection('leads').where('agentId', '==', email).get().then(function(snapshot) {
          var existing = JSON.parse(localStorage.getItem('galaxy_leads') || '[]');
          snapshot.forEach(function(doc) {
            var lead = doc.data();
            var idx = existing.findIndex(function(l) { return l.id === lead.id; });
            if (idx >= 0) existing[idx] = lead;
            else existing.push(lead);
          });
          localStorage.setItem('galaxy_leads', JSON.stringify(existing));
        }).catch(function(e) { console.error('Firestore load error:', e); });
      }

      // Setup agent: referral code + load leads
      function setupAgent(email, name) {
        if (!firebaseReady()) { setTimeout(function() { setupAgent(email, name); }, 500); return; }
        var existingCode = localStorage.getItem('galaxy_ref_code_' + email);
        if (!existingCode) {
          var code = (name ? name.substring(0,2).toUpperCase() : 'AG') 
                   + Math.random().toString(36).substring(2,5).toUpperCase();
          db.collection('referrals').doc(code).set({ email: email, name: name || '' })
            .then(function() { 
              localStorage.setItem('galaxy_ref_code_' + email, code);
              localStorage.setItem('galaxy_ref_code', code);
              console.log('Referral code generated:', code);
              patchReferralCode();
            });
        } else {
          localStorage.setItem('galaxy_ref_code', existingCode);
        }
        loadAgentLeads(email);
      }

      // Intercept localStorage saves
      var _origSetItem = Storage.prototype.setItem;
      Storage.prototype.setItem = function(key, value) {
        _origSetItem.call(this, key, value);
        try {
          if (key === 'galaxy_user' && firebaseReady()) {
            var user = JSON.parse(value);
            if (user && user.type === 'agent') {
              // Find email: check galaxy_agents first, then Firestore
              function doSetup(agentEmail) {
                if (!agentEmail) return;
                if (user.email && user.password) {
                  auth.createUserWithEmailAndPassword(user.email, user.password).catch(function(e) {
                    if (e.code !== 'auth/email-already-in-use') console.error('Firebase Auth error:', e.code);
                  });
                }
                setupAgent(agentEmail, user.name || agentEmail);
              }
              var agentEmail = user.email;
              if (!agentEmail && user.id) {
                var agents = JSON.parse(localStorage.getItem('galaxy_agents') || '[]');
                var found = agents.find(function(a) { return a.id === user.id || a.email === user.id; });
                if (found) agentEmail = found.email || found.id;
              }
              if (agentEmail) { doSetup(agentEmail); }
              else if (user.id) {
                // Direct Firestore lookup
                db.collection('agents').get().then(function(snap) {
                  snap.forEach(function(doc) {
                    var a = doc.data();
                    if (a.id === user.id || a.email === user.id) {
                      doSetup(a.email || a.id);
                      // Also save to localStorage for future
                      var all = JSON.parse(localStorage.getItem('galaxy_agents') || '[]');
                      if (!all.find(function(x) { return x.email === a.email; })) {
                        all.push(a);
                        localStorage.setItem('galaxy_agents', JSON.stringify(all));
                      }
                    }
                  });
                });
              }
            }
          }
          if (key === 'galaxy_agents' && firebaseReady()) {
            var agents = JSON.parse(value);
            if (Array.isArray(agents) && agents.length > 0) {
              var last = agents[agents.length - 1];
              if (last && last.email) {
                // Save to Firestore agents collection (for login sync)
                db.collection('agents').doc(last.email).set(JSON.parse(JSON.stringify(last)));
                if (last.password) {
                  auth.createUserWithEmailAndPassword(last.email, last.password).catch(function(e) {
                    if (e.code !== 'auth/email-already-in-use') console.error('Firebase Auth error:', e.code);
                  });
                }
                setupAgent(last.email, last.fullName || last.name || last.email);
              }
            }
          }
          if (key === 'galaxy_leads' && firebaseReady()) {
            var data = JSON.parse(value);
            var lead = Array.isArray(data) ? data[data.length - 1] : data;
            if (lead && lead.name && lead.phone) saveLeadToFirestore(lead);
          }
        } catch(e) { console.error('Firebase sync error:', e); }
      };      // Auto-load leads when page loads (check if agent is logged in)
      // Load existing agents from Firestore (for registration uniqueness check)
      // Sync agents from Firestore (for login check) - fast
      function syncExistingAgents() {
        if (!firebaseReady()) { setTimeout(syncExistingAgents, 200); return; }
        db.collection('agents').get().then(function(snapshot) {
          var agents = [];
          snapshot.forEach(function(doc) { agents.push(doc.data()); });
          if (agents.length > 0) {
            localStorage.setItem('galaxy_agents', JSON.stringify(agents));
          }
        }).catch(function() {});
      }
      // Try immediately, retry quickly
      syncExistingAgents();
      setTimeout(syncExistingAgents, 500);
      setTimeout(syncExistingAgents, 1500);

      function checkAgent() {
        if (!firebaseReady()) { setTimeout(checkAgent, 1000); return; }
        var user = JSON.parse(localStorage.getItem('galaxy_user') || '{}');
        if (user.email && user.type === 'agent') loadAgentLeads(user.email);
      }
      setTimeout(checkAgent, 2000);
    })();
  </script>

<script>
(function(){

  // Get referral agent ID
  function track(type, data) {
    var refCode = localStorage.getItem('galaxy_referral_code');
    if (!refCode) return;
    var id = Date.now().toString(36) + Math.random().toString(36).substr(2,5);
    var body = { type: type, agentId: refCode, visitorId: vid, data: data || {}, createdAt: new Date().toISOString() };
    try { fetch('/api/activities/' + id, { method: 'PUT', keepalive: true, headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) }).catch(function(){}); } catch(e) {}
  }
  
  // Track Telegram button click
  document.addEventListener('click', function(e) {
    var el = e.target.closest('.telegram-glass-btn, a[href*="t.me"]');
    if (el) { track('telegram_click', { href: el.href }); }
  });
  
  // Track calculator open
  document.addEventListener('click', function(e) {
    var el = e.target.closest('[onclick*="openCalc"], [data-action="calc"]');
    if (el) { track('calculator_open', { model: calcModel ? calcModel.name : '' }); }
  });
  
  // Expose track function for React components
  window.__track = track;
})();
</script>
