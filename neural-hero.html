<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GALAXY MOTO — Neural Hero</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: #0a0a0f; color: #fff; overflow: hidden; height: 100vh; }
    canvas#bg { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; display: block; }
    .hero-overlay {
      position: fixed; inset: 0; z-index: 10;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 40px 20px; text-align: center;
      background: rgba(0,0,0,0.15);
    }
    .hero__badge {
      display: inline-flex; align-items: center; gap: 8px;
      background: rgba(255,255,255,0.07); backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,0.1);
      color: #fff; font-size: 13px; font-weight: 500;
      padding: 8px 16px; border-radius: 999px; margin-bottom: 32px;
    }
    .hero__badge-dot { width: 8px; height: 8px; background: #62b56a; border-radius: 50%; }
    .hero__title {
      font-size: 44px; font-weight: 800; line-height: 1.15;
      margin-bottom: 16px; text-shadow: 0 2px 20px rgba(0,0,0,0.5);
    }
    .hero__title-highlight { background: linear-gradient(135deg, #0bc5ea, #8b5cf6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .hero__subtitle {
      font-size: 17px; color: rgba(255,255,255,0.85);
      margin-bottom: 32px; max-width: 520px; line-height: 1.55;
    }
    .hero__actions { display: flex; flex-direction: column; gap: 12px; align-items: center; width: 100%; max-width: 360px; }
    .hero__actions-row { display: flex; gap: 10px; width: 100%; }
    .hero__actions-row .hero__btn { flex: 1; }
    .hero__btn {
      display: inline-flex; align-items: center; justify-content: center;
      padding: 13px 28px; font-family: 'Inter', sans-serif;
      font-size: 15px; font-weight: 600; border-radius: 999px;
      cursor: pointer; transition: all .25s ease; border: none; text-decoration: none; white-space: nowrap; width: 100%;
    }
    .hero__btn--primary { background: #111; color: #fff; border: 1.5px solid rgba(255,255,255,0.15); }
    .hero__btn--primary:hover { background: #222; transform: translateY(-1px); }
    .hero__btn--outline { background: transparent; color: #fff; border: 1.5px solid rgba(255,255,255,0.35); }
    .hero__btn--outline:hover { background: rgba(255,255,255,0.08); transform: translateY(-1px); }
    .hero__btn--gradient { background: linear-gradient(135deg, #0bc5ea, #8b5cf6); color: #fff; }
    .hero__btn--gradient:hover { opacity: .9; transform: translateY(-1px); }
    .reviews-trigger {
      display: inline-flex; align-items: center; gap: 10px;
      cursor: pointer; margin-bottom: 24px; padding: 8px 20px 8px 16px;
      border-radius: 999px; background: rgba(255,255,255,0.07);
      backdrop-filter: blur(8px); border: 1px solid rgba(255,255,255,0.1);
      transition: all .25s; text-decoration: none;
    }
    .reviews-trigger:hover { background: rgba(255,255,255,0.12); transform: translateY(-1px); }
    .reviews-trigger__star { display: flex; align-items: center; justify-content: center; width: 36px; height: 36px; background: linear-gradient(135deg,#0bc5ea,#8b5cf6); border-radius: 50%; font-size: 16px; }
    .reviews-trigger__text { font-size: 13px; font-weight: 600; color: #fff; }
    .reviews-trigger__badge { background: #fc0; padding: 1px 6px; border-radius: 4px; font-size: 11px; font-weight: 700; color: #111; }
    .reviews-trigger__label { font-size: 12px; color: rgba(255,255,255,0.5); }
    .chat-fab {
      position: fixed; bottom: 24px; right: 24px; z-index: 100;
      width: 56px; height: 56px;
      background: linear-gradient(135deg, #0bc5ea, #8b5cf6);
      color: #fff; border-radius: 50%; border: none;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 20px rgba(0,0,0,0.3); cursor: pointer; transition: all .25s; text-decoration: none;
    }
    .chat-fab:hover { transform: scale(1.1); }
    @media (max-width: 768px) {
      .hero__title { font-size: 28px; }
      .hero__subtitle { font-size: 15px; max-width: 400px; }
      .hero__btn { font-size: 13px; padding: 11px 20px; }
    }
    @media (max-width: 480px) {
      .hero__title { font-size: 24px; }
      .hero__subtitle { font-size: 14px; }
      .hero__actions-row { flex-direction: column; }
    }
  </style>
</head>
<body>
<canvas id="bg"></canvas>
<div class="hero-overlay">
  <div class="hero__badge animate-seq"><span class="hero__badge-dot"></span> Мототехника и сервис в Сочи</div>
  <div class="hero__title animate-seq-1">GALAXY <span class="hero__title-highlight">MOTO</span><br>Полный цикл твоего движения</div>
  <div class="hero__subtitle animate-seq-2">Покупка, аренда, честный сервис и<br>оригинальные запчасти для мототехники.<br>Берем все заботы на себя</div>
  <a class="reviews-trigger animate-seq-3" href="#">
    <div class="reviews-trigger__star">⭐</div>
    <span class="reviews-trigger__text">Рейтинг <span class="reviews-trigger__badge">5.0</span></span>
    <span class="reviews-trigger__label">на Яндекс.Картах</span>
    <svg width="18" height="18" viewBox="0 0 20 20" fill="none"><defs><linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#0bc5ea"/><stop offset="100%" stop-color="#8b5cf6"/></linearGradient></defs><path d="M8 5C8 5 13 9 13 10C13 11 8 15 8 15" stroke="url(#g)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg>
  </a>
  <div class="hero__actions animate-seq-4">
    <button class="hero__btn hero__btn--primary">Выбрать технику</button>
    <div class="hero__actions-row animate-seq-5">
      <button class="hero__btn hero__btn--outline">Взять в аренду</button>
      <button class="hero__btn hero__btn--gradient">Записаться на сервис</button>
    </div>
  </div>
</div>
<a class="chat-fab" href="#">
  <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
</a>

<script>
// ===== WebGL Neural Vortex =====
(function(){
var canvas = document.getElementById('bg');
var gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
if (!gl) { document.body.innerHTML = ''; return; }

// Pointer with smoothing
var pointer = { x: 0.5, y: 0.5, tX: 0.5, tY: 0.5 };

function resize() {
  var dpr = Math.min(window.devicePixelRatio || 1, 2);
  canvas.width = window.innerWidth * dpr;
  canvas.height = window.innerHeight * dpr;
  gl.viewport(0, 0, canvas.width, canvas.height);
}
resize();
window.addEventListener('resize', resize);

// Vertex Shader
var vsSrc = [
  'precision mediump float;',
  'attribute vec2 a_position;',
  'varying vec2 vUv;',
  'void main() {',
  '  vUv = .5 * (a_position + 1.);',
  '  gl_Position = vec4(a_position, 0.0, 1.0);',
  '}'
].join('\n');

// Fragment Shader
var fsSrc = [
  'precision mediump float;',
  'varying vec2 vUv;',
  'uniform float u_time;',
  'uniform float u_ratio;',
  'uniform vec2 u_pointer_position;',
  'uniform float u_scroll_progress;',
  '',
  'vec2 rotate(vec2 uv, float th) {',
  '  return mat2(cos(th), sin(th), -sin(th), cos(th)) * uv;',
  '}',
  '',
  'float neuro_shape(vec2 uv, float t, float p) {',
  '  vec2 sine_acc = vec2(0.);',
  '  vec2 res = vec2(0.);',
  '  float scale = 8.;',
  '  for (int j = 0; j < 15; j++) {',
  '    uv = rotate(uv, 1.);',
  '    sine_acc = rotate(sine_acc, 1.);',
  '    vec2 layer = uv * scale + float(j) + sine_acc - t;',
  '    sine_acc += sin(layer) + 2.4 * p;',
  '    res += (.5 + .5 * cos(layer)) / scale;',
  '    scale *= (1.2);',
  '  }',
  '  return res.x + res.y;',
  '}',
  '',
  'void main() {',
  '  vec2 uv = .5 * vUv;',
  '  uv.x *= u_ratio;',
  '  vec2 pointer = vUv - u_pointer_position;',
  '  pointer.x *= u_ratio;',
  '  float p = clamp(length(pointer), 0., 1.);',
  '  p = .5 * pow(1. - p, 2.);',
  '  float t = .001 * u_time;',
  '  vec3 color = vec3(0.);',
  '  float noise = neuro_shape(uv, t, p);',
  '  noise = 1.2 * pow(noise, 3.);',
  '  noise += pow(noise, 10.);',
  '  noise = max(.0, noise - .5);',
  '  noise *= (1. - length(vUv - .5));',
  '  color = vec3(0.5, 0.15, 0.65);',
  '  color = mix(color, vec3(0.02, 0.7, 0.9), 0.32 + 0.16 * sin(2.0 * u_scroll_progress + 1.2));',
  '  color += vec3(0.15, 0.0, 0.6) * sin(2.0 * u_scroll_progress + 1.5);',
  '  color = color * noise;',
  '  gl_FragColor = vec4(color, noise);',
  '}'
].join('\n');

function compileShader(src, type) {
  var shader = gl.createShader(type);
  gl.shaderSource(shader, src);
  gl.compileShader(shader);
  if (!gl.getShaderParameter(shader, gl.COMPILE_STATUS)) {
    console.error('Shader error:', gl.getShaderInfoLog(shader));
    gl.deleteShader(shader);
    return null;
  }
  return shader;
}

var vs = compileShader(vsSrc, gl.VERTEX_SHADER);
var fs = compileShader(fsSrc, gl.FRAGMENT_SHADER);
if (!vs || !fs) { document.body.innerHTML = ''; return; }

var prog = gl.createProgram();
gl.attachShader(prog, vs);
gl.attachShader(prog, fs);
gl.linkProgram(prog);
if (!gl.getProgramParameter(prog, gl.LINK_STATUS)) {
  console.error('Program link error:', gl.getProgramInfoLog(prog));
  return;
}
gl.useProgram(prog);

// Geometry (full screen quad)
var vertices = new Float32Array([-1, -1, 1, -1, -1, 1, 1, 1]);
var buf = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, buf);
gl.bufferData(gl.ARRAY_BUFFER, vertices, gl.STATIC_DRAW);
var posLoc = gl.getAttribLocation(prog, 'a_position');
gl.enableVertexAttribArray(posLoc);
gl.bindBuffer(gl.ARRAY_BUFFER, buf);
gl.vertexAttribPointer(posLoc, 2, gl.FLOAT, false, 0, 0);

// Uniforms
var uTime = gl.getUniformLocation(prog, 'u_time');
var uRatio = gl.getUniformLocation(prog, 'u_ratio');
var uPointerPos = gl.getUniformLocation(prog, 'u_pointer_position');
var uScrollProgress = gl.getUniformLocation(prog, 'u_scroll_progress');

// Set initial ratio
var dpr = Math.min(window.devicePixelRatio || 1, 2);
gl.uniform1f(uRatio, (window.innerWidth * dpr) / (window.innerHeight * dpr));

// Pointer events
function onPointerMove(x, y) {
  pointer.tX = x;
  pointer.tY = y;
}

window.addEventListener('pointermove', function(e) {
  onPointerMove(e.clientX, e.clientY);
});

window.addEventListener('touchmove', function(e) {
  if (e.touches[0]) {
    onPointerMove(e.touches[0].clientX, e.touches[0].clientY);
  }
}, { passive: true });

// Animation loop
var start = performance.now();

function render() {
  var currentTime = performance.now() - start;

  // Smooth pointer movement
  pointer.x += (pointer.tX - pointer.x) * 0.2;
  pointer.y += (pointer.tY - pointer.y) * 0.2;

  gl.uniform1f(uTime, currentTime);
  gl.uniform1f(uRatio, (window.innerWidth * (window.devicePixelRatio||1)) / (window.innerHeight * (window.devicePixelRatio||1)));
  gl.uniform2f(uPointerPos, pointer.x / window.innerWidth, 1 - pointer.y / window.innerHeight);
  gl.uniform1f(uScrollProgress, window.pageYOffset / (2 * window.innerHeight));

  gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
  requestAnimationFrame(render);
}

render();
})();
</script>
</body>
</html>
