<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Inter,sans-serif;background:#f5f5f5;color:#111;min-height:100vh}
.admin-header{background:#111;color:#fff;padding:16px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.admin-header h1{font-size:18px;font-weight:700;letter-spacing:.5px}
.admin-header a{color:#999;text-decoration:none;font-size:13px;font-weight:500;cursor:pointer}
.admin-header a:hover{color:#fff}
.admin-container{max-width:900px;margin:0 auto;padding:20px 16px 40px}
.login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;background:#111}
.login-box{background:#fff;border-radius:16px;padding:2rem;max-width:360px;width:100%;text-align:center}
.login-box h2{font-size:20px;font-weight:700;margin-bottom:4px;letter-spacing:1px}
.login-box p{font-size:13px;color:#888;margin-bottom:20px}
.login-box input{width:100%;padding:12px 14px;font-size:16px;font-family:Inter,sans-serif;border:1.5px solid #ddd;border-radius:10px;text-align:center;letter-spacing:8px;outline:none}
.login-box input:focus{border-color:#111}
.login-box .error{color:#e53935;font-size:13px;margin-top:8px;display:none}
.login-btn{width:100%;padding:12px;margin-top:14px;font-size:15px;font-weight:600;font-family:Inter,sans-serif;color:#fff;background:#111;border:none;border-radius:10px;cursor:pointer}
.login-btn:hover{background:#333}
.stats{display:flex;gap:10px;margin-bottom:20px}
.stat-card{flex:1;background:#fff;border-radius:12px;padding:14px;text-align:center;border:1.5px solid #eee}
.stat-card__value{font-size:24px;font-weight:800}
.stat-card__label{font-size:11px;color:#888;text-transform:uppercase;letter-spacing:.5px;margin-top:2px}
.calendar-wrap{background:#fff;border-radius:14px;border:1.5px solid #eee;padding:10px 12px;margin-bottom:16px}
.cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.cal-nav button{width:28px;height:28px;border-radius:50%;border:1.5px solid #ddd;background:#fff;color:#333;font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.cal-nav button:hover{background:#f0f0f0;border-color:#999}
.cal-month{font-size:13px;font-weight:700}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.cal-weekday{font-size:10px;color:#999;text-align:center;font-weight:600;text-transform:uppercase;padding:4px 0;letter-spacing:.3px}
.cal-day{text-align:center;padding:6px 0;font-size:.85rem;font-weight:500;color:#333;border-radius:8px;cursor:pointer;border:2px solid transparent;position:relative;transition:all .1s}
.cal-day:hover{background:#f5f5f5}.cal-day--other{color:#ddd;pointer-events:none}
.cal-day--today{font-weight:700;color:#111;background:#f5f5f5}
.cal-day--selected{background:#111!important;color:#fff!important;font-weight:600}
.cal-day__count{position:absolute;top:0;right:2px;font-size:8px;font-weight:700;color:#888;min-width:10px;text-align:center;line-height:12px}
.cal-day--green{background:#e8f5e9;border-color:#c8e6c9}.cal-day--green .cal-day__count{color:#2e7d32}
.cal-day--yellow{background:#fff8e1;border-color:#ffe082}.cal-day--yellow .cal-day__count{color:#e65100}
.cal-day--red{background:#ffebee;border-color:#ef9a9a}.cal-day--red .cal-day__count{color:#c62828}
.cal-legend{display:flex;gap:14px;justify-content:center;margin-top:10px;font-size:10px;color:#888}
.cal-legend span{display:flex;align-items:center;gap:4px}.cal-legend i{width:10px;height:10px;border-radius:3px}
.bookings-section h3{font-size:14px;font-weight:700;margin-bottom:10px;letter-spacing:.5px}
.booking-status{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;padding:3px 8px;border-radius:6px;white-space:nowrap}
.status-new{background:linear-gradient(135deg,#0bc5ea,#8b5cf6);color:#fff}
.status-confirmed{background:#e8f5e9;color:#2e7d32}
.status-completed{background:#f5f5f5;color:#888}
.status-cancelled{background:#ffebee;color:#e53935}
.empty-state{text-align:center;padding:30px 20px;color:#888;font-size:13px}
.tab-bar{display:flex;background:#fff;border-radius:12px;border:1.5px solid #eee;margin-bottom:16px;overflow:hidden}
.tab-bar button{flex:1;padding:10px;font-size:12px;font-weight:600;font-family:Inter,sans-serif;border:none;cursor:pointer;background:transparent;color:#888}
.tab-bar button.active{background:#111;color:#fff}
.tab-bar button:hover:not(.active){background:#f5f5f5}
.hidden{display:none!important}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;justify-content:center;align-items:center;padding:1rem}
.modal-overlay.active{display:flex}
.modal-box{background:#fff;max-width:480px;width:100%;border-radius:14px;padding:1.5rem;position:relative;max-height:80vh;overflow-y:auto;box-shadow:0 10px 40px rgba(0,0,0,.2)}
.modal-close{position:absolute;top:12px;right:14px;background:none;border:none;font-size:20px;cursor:pointer;color:#999;width:32px;height:32px;display:flex;align-items:center;justify-content:center;border-radius:50%}
.modal-close:hover{background:#f0f0f0}
.detail-row{display:flex;padding:6px 0;border-bottom:1px solid #f0f0f0;font-size:13px}
.detail-row .label{color:#888;width:80px;flex-shrink:0}
.detail-row .value{font-weight:500}
.bookings-table{background:#fff;border-radius:12px;border:1.5px solid #eee;overflow:hidden}
.bookings-table table{width:100%;border-collapse:collapse;font-size:13px}
.bookings-table td{padding:8px 10px;border-bottom:1px solid #f0f0f0}
.bookings-table td:first-child{white-space:nowrap;font-weight:600;color:#111}
.bookings-table td:nth-child(5){text-align:right}
.bookings-table thead td{font-weight:600;color:#888;text-transform:uppercase;font-size:10px;letter-spacing:.5px;border-top:none;background:#fafafa;cursor:default}
.bookings-table tbody tr{cursor:pointer;transition:background .1s}
.bookings-table tbody tr:hover{background:#f0f0f0!important}
@media(max-width:640px){
.admin-container{padding:12px 10px 30px}.stats{gap:6px}.stat-card{padding:10px}.stat-card__value{font-size:20px}
.calendar-wrap{padding:8px}.cal-day{font-size:.75rem;padding:5px 0}.cal-day__count{font-size:7px}
.bookings-table td{padding:6px;font-size:12px}
}

.btn-grad,.btn-grad-del{background:linear-gradient(135deg,#0bc5ea,#8b5cf6);color:#fff;padding:5px 12px;font-size:11px;font-weight:600;font-family:Inter,sans-serif;border:none;border-radius:6px;cursor:pointer;transition:opacity .15s}.btn-grad:hover,.btn-grad-del:hover{opacity:.85}
.ts-slot{text-align:center;padding:8px 4px;font-size:13px;font-weight:500;color:#333;border:1px solid #ddd;border-radius:8px;cursor:pointer}
.ts-taken{color:#aaa;background:#f5f5f5;cursor:default}
tr.done td:not(:last-child){text-decoration:line-through!important;text-decoration-thickness:1px!important;opacity:.55}
</style>

<body>
<div id="loginScreen" class="login-screen">
  <div class="login-box">
    <h2>GALAXY MOTO</h2>
    <p>Панель управления записями</p>
    <input type="password" id="pinInput" placeholder="****" maxlength="4" inputmode="numeric" autocomplete="off" onkeydown="if(event.key==='Enter')doLogin()">
    <div class="error" id="loginError">Неверный пин-код</div>
    <button class="login-btn" onclick="doLogin()">Войти</button>
  </div>
</div>
<div id="adminApp" class="hidden">
  <div class="admin-header">
    <h1>GALAXY MOTO</h1>
    <a onclick="doLogout()">Выйти</a>
  </div>
  <div class="admin-container">
    <div class="stats" id="statsRow"></div>
    <div class="calendar-wrap" id="calWrap">
      <div class="cal-nav">
        <button onclick="calMove(-1)">‹</button>
        <span class="cal-month" id="calMonth"></span>
        <button onclick="calMove(1)">›</button>
      </div>
      <div class="cal-grid" id="calGrid"></div>
      <div class="cal-legend">
        <span><i style="background:#e8f5e9;border:1px solid #c8e6c9"></i> 1</span>
        <span><i style="background:#fff8e1;border:1px solid #ffe082"></i> 2</span>
        <span><i style="background:#ffebee;border:1px solid #ef9a9a"></i> 3+</span>
      </div>
    </div>
    <div class="tab-bar">
      <button class="active" onclick="switchTab(0)" id="tab0">Сегодня</button>
      <button onclick="switchTab(1)" id="tab1">Завтра</button>
      <button onclick="switchTab(2)" id="tab2">Все</button>
    </div>
    <div class="bookings-section" id="bookingsList"></div>
  </div>
</div>

<div class="modal-overlay" id="addModal">
  <div class="modal-box">
    <button class="modal-close" onclick="closeAddForm()">&times;</button>
    <h3 style="margin-bottom:12px">Новая запись</h3>
    <div style="margin-bottom:10px">
      <label style="font-size:12px;color:#888;display:block;margin-bottom:3px">Дата</label>
      <input type="date" id="addDate" onchange="renderTimeSlots()" style="width:100%;padding:10px 12px;font-size:14px;font-family:Inter,sans-serif;border:1.5px solid #ddd;border-radius:8px;outline:none;box-sizing:border-box">
    </div>
    <div style="margin-bottom:10px">
      <label style="font-size:12px;color:#888;display:block;margin-bottom:3px">Время</label><div id="addTimeSlots" style="display:grid;grid-template-columns:repeat(4,1fr);gap:6px"></div>
      <input type="hidden" id="addTime" value="">
    </div>
    <div style="margin-bottom:10px">
      <label style="font-size:12px;color:#888;display:block;margin-bottom:3px">Имя *</label>
      <input type="text" id="addName" placeholder="Имя" style="width:100%;padding:10px 12px;font-size:14px;font-family:Inter,sans-serif;border:1.5px solid #ddd;border-radius:8px;outline:none;box-sizing:border-box">
    </div>
    <div style="margin-bottom:10px">
      <label style="font-size:12px;color:#888;display:block;margin-bottom:3px">Телефон</label>
      <input type="tel" id="addPhone" placeholder="Телефон" style="width:100%;padding:10px 12px;font-size:14px;font-family:Inter,sans-serif;border:1.5px solid #ddd;border-radius:8px;outline:none;box-sizing:border-box">
    </div>
    <div style="margin-bottom:10px">
      <label style="font-size:12px;color:#888;display:block;margin-bottom:3px">Модель</label>
      <input type="text" id="addModel" placeholder="Модель" style="width:100%;padding:10px 12px;font-size:14px;font-family:Inter,sans-serif;border:1.5px solid #ddd;border-radius:8px;outline:none;box-sizing:border-box">
    </div>
    <div style="margin-bottom:10px">
      <label style="font-size:12px;color:#888;display:block;margin-bottom:3px">Описание</label>
      <textarea id="addNotes" rows="2" placeholder="Описание" style="width:100%;padding:10px 12px;font-size:14px;font-family:Inter,sans-serif;border:1.5px solid #ddd;border-radius:8px;outline:none;box-sizing:border-box;resize:vertical"></textarea>
    </div>
    <button class="btn-grad" style="width:100%;padding:12px;font-size:14px" onclick="saveNewRecord()">Сохранить</button>
  </div>
</div>

<div class="modal-overlay" id="detailModal">
  <div class="modal-box">
    <button class="modal-close" onclick="closeDet()">&times;</button>
    <h3 id="detTitle" style="margin-bottom:6px;font-size:16px;font-weight:700;color:#111">Детали записи</h3>
    <div id="detBody"></div>
    <div style="display:flex;gap:8px;margin-top:16px;flex-wrap:wrap" id="detActions"></div>
  </div>
</div>
<script>

var PIN='8888',BK=[],TB=0,CV=new Date(),SD=null,US=null,US2=null;
var SL={'new':'\u041d\u041e\u0412\u0410\u042f','confirmed':'\u041f\u041e\u0414\u0422\u0412\u0415\u0420\u0416\u0414\u0415\u041d\u0410','completed':'\u0412\u042b\u041f\u041e\u041b\u041d\u0415\u041d\u0410','cancelled':'\u041e\u0422\u041c\u0415\u041d\u0415\u041d\u0410'};
var MN=['января','февраля','марта','апреля','мая','июня','июля','августа','сентября','октября','ноября','декабря'];var SC={'new':'status-new','confirmed':'status-confirmed','completed':'status-completed','cancelled':'status-cancelled'};
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function fmt(d){var y=d.getFullYear(),m=(d.getMonth()+1+'').padStart(2,'0'),dd=(d.getDate()+'').padStart(2,'0');return y+'-'+m+'-'+dd}
function same(a,b){return a.getFullYear()===b.getFullYear()&&a.getMonth()===b.getMonth()&&a.getDate()===b.getDate()}
function doLogin(){var p=document.getElementById('pinInput').value;if(p===PIN){localStorage.setItem('ga','1');document.getElementById('loginScreen').classList.add('hidden');document.getElementById('adminApp').classList.remove('hidden');try{initFB()}catch(e){}}else{document.getElementById('loginError').style.display='block'}}
function doLogout(){localStorage.removeItem('ga');if(US)US();if(US2)US2();document.getElementById('adminApp').classList.add('hidden');document.getElementById('loginScreen').classList.remove('hidden');document.getElementById('loginError').style.display='none'}
function initFB(){try{var FC={apiKey:'AIzaSyDOZnESPJRJlEf3HTYqNyv1O0mYUZoPJzc',authDomain:'capsulehouse-1c0c9.firebaseapp.com',projectId:'capsulehouse-1c0c9',storageBucket:'capsulehouse-1c0c9.firebasestorage.app',messagingSenderId:'640070206939',appId:'1:640070206939:web:e7ba997ec68457be2893fe'};try{firebase.initializeApp(FC);}catch(e){}var db=firebase.firestore();db.settings({merge:true});if(US||US2)return;BK=[];US2=db.collection('galaxymoto_bookings').onSnapshot(function(s){s.docChanges().forEach(function(c){var x=c.doc.data(),id=c.doc.id;if(c.type==='removed'){BK=BK.filter(function(b){return b.id!==id});R();return}if(x.date&&x.name){var i=BK.findIndex(function(b){return b.id===id});var b={id:id,date:x.date,time:x.time||'',name:x.name,phone:x.phone||'',model:x.model||'',notes:x.notes||'',status:x.status||'new'};if(i>=0)BK[i]=b;else BK.push(b);R()}})});US=db.collection('leads').onSnapshot(function(s){s.docChanges().forEach(function(c){var x=c.doc.data(),id=c.doc.id;if(c.type==='removed'){BK=BK.filter(function(b){return b.id!==id});R();return}if(x.date&&x.name){var i=BK.findIndex(function(b){return b.id===id});var b={id:id,date:x.date,time:x.time||'',name:x.name,phone:x.phone||'',model:x.model||'',notes:x.notes||'',status:x.status||'new'};if(i>=0)BK[i]=b;else BK.push(b);R()}})});}catch(e){}}
function R(){RSTAT();RCAL();RBOK()}
function RSTAT(){var n=BK.length,p=BK.filter(function(b){return b.status==='new'}).length,c=BK.filter(function(b){return b.status==='confirmed'}).length;document.getElementById('statsRow').innerHTML='<div class="stat-card"><div class="stat-card__value">'+n+'</div><div class="stat-card__label">\u0412\u0441\u0435\u0433\u043e</div></div><div class="stat-card"><div class="stat-card__value">'+p+'</div><div class="stat-card__label">\u041d\u043e\u0432\u044b\u0435</div></div><div class="stat-card"><div class="stat-card__value">'+c+'</div><div class="stat-card__label">\u041f\u043e\u0434\u0442\u0432\u0435\u0440\u0436\u0434\u0435\u043d\u044b</div></div><div class=\"stat-card\" style=\"cursor:pointer;background:#111;color:#fff\" onclick=\"openAddForm()\"><div class=\"stat-card__value\" style=\"color:#fff;font-size:28px\">+</div><div class=\"stat-card__label\" style=\"color:rgba(255,255,255,.7)\">\u041d\u043e\u0432\u0430\u044f \u0437\u0430\u043f\u0438\u0441\u044c</div></div>'}
function RCAL(){var y=CV.getFullYear(),m=CV.getMonth();document.getElementById('calMonth').textContent=new Date(y,m).toLocaleDateString('ru',{month:'long',year:'numeric'});var fd=new Date(y,m,1).getDay();fd=(fd===0?6:fd-1);var ld=new Date(y,m+1,0).getDate(),pd=new Date(y,m,1-fd).getDate(),h='',td=new Date(),dw='\u041f\u043d,\u0412\u0442,\u0421\u0440,\u0427\u0442,\u041f\u0442,\u0421\u0431,\u0412\u0441'.split(',');dw.forEach(function(w){h+='<div class="cal-weekday">'+w+'</div>'});for(var i=0;i<fd;i++){h+='<div class="cal-day cal-day--other">'+pd+'</div>';pd++}for(var d=1;d<=ld;d++){var dt=new Date(y,m,d),ds=fmt(dt),cnt=BK.filter(function(b){return b.date===ds}).length,cl='cal-day';if(same(dt,td))cl+=' cal-day--today';if(SD&&same(dt,SD))cl+=' cal-day--selected';if(cnt===1)cl+=' cal-day--green';else if(cnt===2)cl+=' cal-day--yellow';else if(cnt>=3)cl+=' cal-day--red';h+='<div class="'+cl+'" onclick="pickDate('+d+')"><span>'+d+'</span>'+(cnt>0?'<span class="cal-day__count">'+cnt+'</span>':'')+'</div>'}var rm=(7-(fd+ld)%7)%7;for(var i=0;i<rm;i++){h+='<div class="cal-day cal-day--other">'+(i+1)+'</div>'}document.getElementById('calGrid').innerHTML=h}
function calMove(d){CV.setMonth(CV.getMonth()+d);RCAL()}
function pickDate(d){var y=CV.getFullYear(),m=CV.getMonth();SD=new Date(y,m,d);TB=2;document.querySelectorAll('.tab-bar button').forEach(function(b){b.classList.remove('active')});document.getElementById('tab2').classList.add('active');RCAL();RBOK()}
function switchTab(t){TB=t;document.querySelectorAll('.tab-bar button').forEach(function(b){b.classList.remove('active')});document.getElementById('tab'+t).classList.add('active');RBOK()}
function RBOK(){var d=new Date(),tm=new Date(d);tm.setDate(tm.getDate()+1);var f=[];if(TB===0)f=BK.filter(function(b){var bd=new Date(b.date);return same(bd,d)});else if(TB===1)f=BK.filter(function(b){var bd=new Date(b.date);return same(bd,tm)});else if(TB===2&&SD)f=BK.filter(function(b){var bd=new Date(b.date);return same(bd,SD)});else f=[].concat(BK);f.sort(function(a,b){return a.date.localeCompare(b.date)||a.time.localeCompare(b.time)});var h='',tt='\u0412\u0441\u0435 \u0437\u0430\u043f\u0438\u0441\u0438';if(TB===0)tt='\u0421\u0435\u0433\u043e\u0434\u043d\u044f';else if(TB===1)tt='\u0417\u0430\u0432\u0442\u0440\u0430';else if(SD)tt=SD.getDate()+' '+MN[SD.getMonth()]+' ';h+='<h3>'+tt+' — '+f.length+'</h3>';if(f.length===0){h+='<div class="empty-state">\u041d\u0435\u0442 \u0437\u0430\u043f\u0438\u0441\u0435\u0439</div>'}else{h+='<div class="bookings-table"><table><thead><tr><td>\u0414\u0430\u0442\u0430</td><td>\u0418\u043c\u044f</td><td>\u0422\u0435\u043b\u0435\u0444\u043e\u043d</td><td>\u041c\u043e\u0434\u0435\u043b\u044c</td><td style="text-align:right">\u0421\u0442\u0430\u0442\u0443\u0441</td></tr></thead><tbody>';for(var i=0;i<f.length;i++){var b=f[i];var st=b.status||'new';var bg=i%2===0?'#fff':'#fafafa';var dc='';if(st==='completed'||st==='cancelled')dc=' class="done"';h+='<tr'+dc+' style="background:'+bg+'" onclick="openDet(\u0027'+b.id+'\u0027)"><td>'+b.date.split('-').reverse().join('.')+(b.time?' '+b.time:'')+'</td><td>'+esc(b.name)+'</td><td>'+(b.phone||'-')+'</td><td>'+(b.model?esc(b.model):'-')+'</td><td style="text-align:right"><span class="booking-status '+SC[st]+'">'+SL[st]+'</span></td></tr>'}h+='</tbody></table></div>'}document.getElementById('bookingsList').innerHTML=h}
function openDet(id){var b=BK.find(function(x){return x.id===id});if(!b)return;var st=b.status||'new';document.getElementById('detTitle').textContent='\u0414\u0435\u0442\u0430\u043b\u0438 \u0437\u0430\u043f\u0438\u0441\u0438';var h='<div class="detail-row"><span class="label">\u0414\u0430\u0442\u0430</span><span class="value">'+b.date.split('-').reverse().join('.')+'</span></div>';if(b.time)h+='<div class="detail-row"><span class="label">\u0412\u0440\u0435\u043c\u044f</span><span class="value">'+b.time+'</span></div>';h+='<div class="detail-row"><span class="label">\u0418\u043c\u044f</span><span class="value">'+esc(b.name)+'</span></div>';if(b.phone)h+='<div class="detail-row"><span class="label">\u0422\u0435\u043b\u0435\u0444\u043e\u043d</span><span class="value">'+b.phone+'</span></div>';if(b.model)h+='<div class="detail-row"><span class="label">\u041c\u043e\u0434\u0435\u043b\u044c</span><span class="value">'+esc(b.model)+'</span></div>';if(b.notes)h+='<div class="detail-row"><span class="label">\u041e\u043f\u0438\u0441\u0430\u043d\u0438\u0435</span><span class="value">'+esc(b.notes)+'</span></div>';h+='<div class="detail-row"><span class="label">\u0421\u0442\u0430\u0442\u0443\u0441</span><span class="value"><span class="booking-status '+SC[st]+'">'+SL[st]+'</span></span></div>';document.getElementById('detBody').innerHTML=h;var a='';a+='<button class="btn-grad" onclick="setStat(\u0027'+b.id+'\u0027,\u0027confirmed\u0027);closeDet()"> \u041f\u043e\u0434\u0442\u0432\u0435\u0440\u0434\u0438\u0442\u044c</button>';a+='<button class="btn-grad" onclick="openWorkForm(\u0027'+b.id+'\u0027)"> \u0412\u044b\u043f\u043e\u043b\u043d\u0435\u043d\u0430</button>';a+='<button class="btn-grad-del" onclick="setStat(\u0027'+b.id+'\u0027,\u0027cancelled\u0027);closeDet()"> \u041e\u0442\u043c\u0435\u043d\u0438\u0442\u044c</button>';document.getElementById('detActions').innerHTML=a;document.getElementById('detailModal').classList.add('active')}
function closeDet(){document.getElementById('detailModal').classList.remove('active')}
function setStat(id,st){try{var d=firebase.firestore();d.collection('leads').doc(id).update({status:st,updatedAt:new Date().toISOString()}).catch(function(){});d.collection('galaxymoto_bookings').doc(id).update({status:st,updatedAt:new Date().toISOString()}).catch(function(){})}catch(e){}}
function delRec(id){try{var d=firebase.firestore();d.collection('leads').doc(id).delete().catch(function(){});d.collection('galaxymoto_bookings').doc(id).delete().catch(function(){})}catch(e){}}


function openAddForm(){
  document.getElementById('addModal').classList.add('active');
  document.getElementById('addDate').valueAsDate=new Date();
  renderTimeSlots();
}
function closeAddForm(){
  document.getElementById('addModal').classList.remove('active');
  document.getElementById('addTime').value='';
}
function renderTimeSlots(){
  var dt=document.getElementById("addDate").value;
  var cont=document.getElementById("addTimeSlots");
  if(!dt||!cont)return;
  var h="";
  for(var hh=11;hh<19;hh++){
    for(var mm=0;mm<60;mm+=30){
      var ti=String(hh).padStart(2,"0")+":"+String(mm).padStart(2,"0");
      var taken=BK.some(function(b){return b.date===dt&&b.time===ti});
      if(taken){
        h+="<div class='ts-slot ts-taken'>"+ti+"</div>";
      }else{
        h+="<div class='ts-slot ts-free' onclick=\"selectSlot(this,'"+ti+"')\">"+ti+"</div>";
      }
    }
  }
  cont.innerHTML=h;
}
function selectSlot(el,ti){
  document.getElementById("addTime").value=ti;
  var x=document.getElementById("addTimeSlots").children;
  for(var i=0;i<x.length;i++){x[i].style.borderColor="#ddd";x[i].style.background="#fff"};
  el.style.borderColor="#111";el.style.background="#eee";
}
function saveNewRecord(){
  var dt=document.getElementById('addDate').value;
  var tm=document.getElementById('addTime').value;
  var nm=document.getElementById('addName').value.trim();
  var ph=document.getElementById('addPhone').value.trim();
  var md=document.getElementById('addModel').value.trim();
  var nt=document.getElementById('addNotes').value.trim();
  if(!dt||!nm){alert('Заполните дату и имя');return}
  var id=dt+'_'+(tm?tm.replace(':','-'):'00-00');
  var data={date:dt,time:tm||'',name:nm,phone:ph||'',model:md||'',notes:nt||'',status:'new',createdAt:new Date().toISOString()};
  var d=firebase.firestore();
  d.collection('galaxymoto_bookings').doc(id).set(data).then(function(){closeAddForm()}).catch(function(e){alert('Ошибка')})
}


var workBookingId = "";
function openWorkForm(id){
  workBookingId = id;
  document.getElementById("workModal").classList.add("active");
  document.getElementById("workMileage").value = "";
  document.getElementById("workItems").innerHTML = "";
  for(var i=0;i<3;i++) addWorkRow();
  calcWorkTotal();
}
function closeWorkForm(){
  document.getElementById("workModal").classList.remove("active");
}
function addWorkRow(){
  var tb = document.getElementById("workItems");
  var tr = document.createElement("tr");
  tr.innerHTML = '<td style="padding:4px"><input class="wi-name" placeholder="Наименование" style="width:100%;padding:7px 8px;font-size:12px;font-family:Inter,sans-serif;border:1px solid #ddd;border-radius:6px;outline:none;box-sizing:border-box"></td><td style="padding:4px"><input class="wi-price" type="number" placeholder="0" oninput="calcWorkTotal()" style="width:100%;padding:7px 8px;font-size:12px;font-family:Inter,sans-serif;border:1px solid #ddd;border-radius:6px;outline:none;box-sizing:border-box;text-align:right"></td>';
  tb.appendChild(tr);
}
function calcWorkTotal(){
  var total = 0;
  document.querySelectorAll(".wi-price").forEach(function(el){
    total += parseFloat(el.value) || 0;
  });
  document.getElementById("workTotal").textContent = total;
}
function saveWork(){
  var mileage = document.getElementById("workMileage").value.trim();
  var items = [];
  var names = document.querySelectorAll(".wi-name");
  var prices = document.querySelectorAll(".wi-price");
  for(var i=0;i<names.length;i++){
    var n = names[i].value.trim();
    var p = parseFloat(prices[i].value) || 0;
    if(n || p) items.push({name:n||"-",price:p});
  }
  try{
    var d = firebase.firestore();
    d.collection("leads").doc(workBookingId).update({
      status: "completed",
      completedAt: new Date().toISOString(),
      workDone: {mileage:mileage,items:items,total:document.getElementById("workTotal").textContent}
    }).catch(function(){});
    d.collection("galaxymoto_bookings").doc(workBookingId).update({
      status: "completed",
      completedAt: new Date().toISOString(),
      workDone: {mileage:mileage,items:items,total:document.getElementById("workTotal").textContent}
    }).catch(function(){});
  }catch(e){}
  closeWorkForm();
  closeDet();
}

</script>

<div class="modal-overlay" id="workModal">
  <div class="modal-box" style="max-width:520px">
    <button class="modal-close" onclick="closeWorkForm()">&times;</button>
    <h3 style="margin-bottom:6px;font-size:16px;font-weight:700;color:#111">Какие виды работ были выполнены?</h3>
    <p style="font-size:14px;color:#888;margin:0 0 12px">Заполните информацию о выполненном обслуживании</p>
    <div style="margin-bottom:10px">
      <label style="font-size:13px;font-weight:600;color:#333;display:block;margin-bottom:4px">Пробег</label>
      <input type="text" id="workMileage" placeholder="км" style="width:100%;padding:8px 10px;font-size:13px;font-family:Inter,sans-serif;border:1.5px solid #ddd;border-radius:8px;outline:none;box-sizing:border-box">
    </div>
    <table style="width:100%;border-collapse:collapse;font-size:12px;margin-bottom:10px">
      <thead><tr><th style="text-align:left;padding:6px;color:#888;font-weight:600;border-bottom:2px solid #eee;width:65%">Наименование работ</th><th style="text-align:right;padding:6px;color:#888;font-weight:600;border-bottom:2px solid #eee;width:35%">Стоимость, руб</th></tr></thead>
      <tbody id="workItems"></tbody>
    </table>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
      <a href="javascript:void(0)" onclick="addWorkRow()" style="color:#1983dd;font-weight:600;font-size:12px;text-decoration:none">+ Добавить строку</a>
      <div style="font-size:14px;font-weight:700;color:#111">Итого: <span id="workTotal">0</span> руб</div>
    </div>
    <div style="display:flex;gap:8px">
      <button class="btn-grad" style="flex:1;padding:10px;font-size:13px" onclick="saveWork()">Сохранить</button>
      <button class="btn-grad-del" style="flex:1;padding:10px;font-size:13px;background:#333" onclick="closeWorkForm();closeDet()">Отмена</button>
    </div>
  </div>
</div>
</body>
</html>
