<style>

<body>

<script>
var PIN="8888",BK=[],TB="today",CV=new Date(),SD=null,US=null;
function FMT(d){var y=d.getFullYear(),m=String(d.getMonth()+1).padStart(2,"0"),dd=String(d.getDate()).padStart(2,"0");return y+"-"+m+"-"+dd}
function SAME(a,b){return a.getFullYear()===b.getFullYear()&&a.getMonth()===b.getMonth()&&a.getDate()===b.getDate()}
function checkPin(){var p=document.getElementById("pinInput").value;if(p===PIN){localStorage.setItem("ga","1");document.getElementById("loginScreen").classList.add("hidden");document.getElementById("adminApp").classList.remove("hidden");LSTN()}else{document.getElementById("loginError").style.display="block"}}
function logout(){localStorage.removeItem("ga");if(US)US();document.getElementById("adminApp").classList.add("hidden");document.getElementById("loginScreen").classList.remove("hidden");document.getElementById("loginError").style.display="none"}
(function(){if(localStorage.getItem("ga")==="1"){document.getElementById("loginScreen").classList.add("hidden");document.getElementById("adminApp").classList.remove("hidden");LSTN()}})()
var US2=null;
function LSTN(){if(US)US();if(US2)US2();BK=[];
  try{US2=db.collection("galaxymoto_bookings").onSnapshot(function(s){s.docChanges().forEach(function(ch){var x=ch.doc.data(),id=ch.doc.id;if(ch.type==="removed"){BK=BK.filter(function(b){return b.id!==id});RALL();return}if(x.date&&x.name){var idx=BK.findIndex(function(b){return b.id===id});var b={id:id,date:x.date,time:x.time||"",name:x.name,phone:x.phone||"",model:x.model||"",notes:x.notes||"",source:"booking"};if(idx>=0)BK[idx]=b;else BK.push(b);RALL()}})})
  }catch(e){}
  try{US=db.collection("leads").orderBy("date","asc").onSnapshot(function(s){s.docChanges().forEach(function(ch){var x=ch.doc.data(),id=ch.doc.id;if(ch.type==="removed"){BK=BK.filter(function(b){return b.id!==id});RALL();return}if(x.date&&x.name){var idx=BK.findIndex(function(b){return b.id===id});var b={id:id,date:x.date,time:x.time||"",name:x.name,phone:x.phone||"",model:x.model||"",notes:x.notes||"",status:x.status||"new",source:x.source||""};if(idx>=0)BK[idx]=b;else BK.push(b);RALL()}})})
  }catch(e){}}
function RALL(){RSTAT();RCAL();RBOK()}
function RSTAT(){var n=BK.length,p=BK.filter(function(b){return b.status==="new"}).length,c=BK.filter(function(b){return b.status==="confirmed"}).length;document.getElementById("statsRow").innerHTML='<div class="stat-card"><div class="stat-card__value">'+n+'</div><div class="stat-card__label">Всего</div></div><div class="stat-card"><div class="stat-card__value">'+p+'</div><div class="stat-card__label">Новые</div></div><div class="stat-card"><div class="stat-card__value">'+c+'</div><div class="stat-card__label">Подтверждены</div></div>'}
function RCAL(){var y=CV.getFullYear(),m=CV.getMonth();document.getElementById("calMonth").textContent=new Date(y,m).toLocaleDateString("ru",{month:"long",year:"numeric"});var fd=new Date(y,m,1).getDay();fd=(fd===0?6:fd-1);var ld=new Date(y,m+1,0).getDate(),pd=new Date(y,m,1-fd).getDate(),html="",td=new Date();["Пн","Вт","Ср","Чт","Пт","Сб","Вс"].forEach(function(w){html+='<div class="cal-weekday">'+w+"</div>"});for(var i=0;i<fd;i++){html+='<div class="cal-day cal-day--other">'+pd+"</div>";pd++}for(var d=1;d<=ld;d++){var dt=new Date(y,m,d),ds=FMT(dt),cnt=BK.filter(function(b){return b.date===ds}).length,cls="cal-day";if(SAME(dt,td))cls+=" cal-day--today";if(SD&&SAME(dt,SD))cls+=" cal-day--selected";if(cnt===1)cls+=" cal-day--green";else if(cnt===2)cls+=" cal-day--yellow";else if(cnt>=3)cls+=" cal-day--red";html+='<div class="'+cls+'" onclick="switchTab('all');switchTab('all');SD=new Date('+y+","+m+","+d+');RCAL();RBOK()"><span>'+d+"</span>"+(cnt>0?'<span class="cal-day__count">'+cnt+"</span>":"")+"</div>"}var rem=(7-(fd+ld)%7)%7;for(var i=0;i<rem;i++){html+='<div class="cal-day cal-day--other">'+(i+1)+"</div>"}document.getElementById("calGrid").innerHTML=html}
function calMove(d){CV.setMonth(CV.getMonth()+d);RCAL()}
function switchTab(t){TB=t;document.querySelectorAll(".tab-bar button").forEach(function(b){b.classList.remove("active")});document.getElementById("tab"+t.charAt(0).toUpperCase()+t.slice(1)).classList.add("active");RBOK()}
function RBOK(){var d=new Date(),tm=new Date(d);tm.setDate(tm.getDate()+1);var f=[];if(TB==="today")f=BK.filter(function(b){var bd=new Date(b.date);return SAME(bd,d)});else if(TB==="tomorrow")f=BK.filter(function(b){var bd=new Date(b.date);return SAME(bd,tm)});else if(TB==="all"&&SD)f=BK.filter(function(b){var bd=new Date(b.date);return SAME(bd,SD)});else f=[].concat(BK);f.sort(function(a,b){return a.date.localeCompare(b.date)||a.time.localeCompare(b.time)});var h="";if(TB==="today")h+="<h3>Сегодня &mdash; "+f.length+"</h3>";else if(TB==="tomorrow")h+="<h3>Завтра &mdash; "+f.length+"</h3>";else if(SD)h+="<h3>"+SD.getDate()+"."+(SD.getMonth()+1)+"."+SD.getFullYear()+" &mdash; "+f.length+"</h3>";else h+="<h3>Все записи &mdash; "+f.length+"</h3>";if(f.length===0){h+='<div class="empty-state">Нет записей</div>'}else{h+='<div style="background:#fff;border-radius:12px;border:1.5px solid #eee;overflow:hidden"><table style="width:100%;border-collapse:collapse;font-size:13px">';for(var i=0;i<f.length;i++){var b=f[i];var st=b.status||"new";var bg=i%2===0?"#fff":"#fafafa";var sl={"new":"НОВАЯ","confirmed":"ПОДТВЕРЖДЕНА","completed":"ВЫПОЛНЕНА","cancelled":"ОТМЕНЕНА"};h+='<tr style="background:'+bg+';cursor:pointer" onclick="openDetail(''+b.id+'')">';h+='<td style="padding:8px 10px;white-space:nowrap;font-weight:600;color:#111;border-bottom:1px solid #f0f0f0">'+b.date.split("-").reverse().join(".")+(b.time?" "+b.time:"")+"</td>";h+='<td style="padding:8px 10px;border-bottom:1px solid #f0f0f0">'+esc(b.name)+"</td>";h+='<td style="padding:8px 10px;color:#888;border-bottom:1px solid #f0f0f0">'+(b.phone||"-")+"</td>";h+='<td style="padding:8px 10px;color:#888;border-bottom:1px solid #f0f0f0;max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+(b.model?esc(b.model):"-")+"</td>";h+='<td style="padding:8px 10px;text-align:right;border-bottom:1px solid #f0f0f0"><span class="booking-status status-'+st+'">'+sl[st]+"</span></td></tr>"}h+="</table></div>"}document.getElementById("bookingsList").innerHTML=h}

function esc(s){return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;")}
function openDetail(id){var b=BK.find(function(x){return x.id===id});if(!b)return;var st=b.status||"new";document.getElementById("detailTitle").textContent="Детали записи";var html='<div class="detail-row"><span class="label">Дата</span><span class="value">'+b.date.split("-").reverse().join(".")+"</span></div>";if(b.time)html+='<div class="detail-row"><span class="label">Время</span><span class="value">'+b.time+"</span></div>";html+='<div class="detail-row"><span class="label">Имя</span><span class="value">'+esc(b.name)+"</span></div>";if(b.phone)html+='<div class="detail-row"><span class="label">Телефон</span><span class="value">'+b.phone+"</span></div>";if(b.model)html+='<div class="detail-row"><span class="label">Модель</span><span class="value">'+esc(b.model)+"</span></div>";if(b.notes)html+='<div class="detail-row"><span class="label">Описание</span><span class="value">'+esc(b.notes)+"</span></div>";html+='<div class="detail-row"><span class="label">Статус</span><span class="value"><span class="booking-status status-'+st+'">'+{"new":"НОВАЯ","confirmed":"ПОДТВЕРЖДЕНА","completed":"ВЫПОЛНЕНА","cancelled":"ОТМЕНЕНА"}[st]+"</span></span></div>";document.getElementById("detailBody").innerHTML=html;var act="";act+='<button class="btn-confirm" onclick="setStatus(\''+b.id+'\',\'confirmed\');closeDetail()">&#10003; Подтвердить</button>';act+='<button class="btn-complete" onclick="setStatus(\''+b.id+'\',\'completed\');closeDetail()">&#10003; Выполнена</button>';act+='<button class="btn-cancel" onclick="setStatus(\''+b.id+'\',\'cancelled\');closeDetail()">&#10007; Отменить</button>';act+='<button class="btn-delete" onclick="if(confirm(\'Удалить запись?\')){delBook(\''+b.id+'\')};closeDetail()">&#10007; Удалить</button>';document.getElementById("detailActions").innerHTML=act;document.getElementById("detailModal").classList.add("active")}
function closeDetail(){document.getElementById("detailModal").classList.remove("active")}
function setStatus(id,st){try{db.collection("leads").doc(id).update({status:st,updatedAt:new Date().toISOString()})}catch(e){}}
function delBook(id){try{db.collection("leads").doc(id).delete()}catch(e){}}
</script>
