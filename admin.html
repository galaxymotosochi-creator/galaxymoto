<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Inter,sans-serif;background:#f5f5f5;color:#111;min-height:100vh}
.admin-header{background:#111;color:#fff;padding:16px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.admin-header h1{font-size:18px;font-weight:700;letter-spacing:.5px}
.admin-header a{color:#999;text-decoration:none;font-size:13px;font-weight:500;cursor:pointer}
.admin-header a:hover{color:#fff}
.admin-container{max-width:900px;margin:0 auto;padding:20px 16px 40px}
.login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;background:#111}
.login-box{background:#fff;border-radius:16px;padding:2rem;max-width:360px;width:100%;text-align:center}
.login-box h2{font-size:20px;font-weight:700;margin-bottom:4px;letter-spacing:1px}
.login-box p{font-size:13px;color:#888;margin-bottom:20px}
.login-box input{width:100%;padding:12px 14px;font-size:16px;font-family:Inter,sans-serif;border:1.5px solid #ddd;border-radius:10px;text-align:center;letter-spacing:8px;outline:none}
.login-box input:focus{border-color:#111}
.login-box .error{color:#e53935;font-size:13px;margin-top:8px;display:none}
.login-btn{width:100%;padding:12px;margin-top:14px;font-size:15px;font-weight:600;font-family:Inter,sans-serif;color:#fff;background:#111;border:none;border-radius:10px;cursor:pointer}
.login-btn:hover{background:#333}
.stats{display:flex;gap:10px;margin-bottom:20px}
.stat-card{flex:1;background:#fff;border-radius:12px;padding:14px;text-align:center;border:1.5px solid #eee}
.stat-card__value{font-size:24px;font-weight:800}
.stat-card__label{font-size:11px;color:#888;text-transform:uppercase;letter-spacing:.5px;margin-top:2px}
.calendar-wrap{background:#fff;border-radius:14px;border:1.5px solid #eee;padding:10px 12px;margin-bottom:16px}
.cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.cal-nav button{width:28px;height:28px;border-radius:50%;border:1.5px solid #ddd;background:#fff;color:#333;font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.cal-nav button:hover{background:#f0f0f0;border-color:#999}
.cal-month{font-size:13px;font-weight:700}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.cal-weekday{font-size:10px;color:#999;text-align:center;font-weight:600;text-transform:uppercase;padding:4px 0;letter-spacing:.3px}
.cal-day{text-align:center;padding:6px 0;font-size:.85rem;font-weight:500;color:#333;border-radius:8px;cursor:pointer;border:2px solid transparent;position:relative;transition:all .1s}
.cal-day:hover{background:#f5f5f5}.cal-day--other{color:#ddd;pointer-events:none}
.cal-day--today{font-weight:700;color:#111;background:#f5f5f5}
.cal-day--selected{background:#111!important;color:#fff!important;font-weight:600}
.cal-day__count{position:absolute;top:0;right:2px;font-size:8px;font-weight:700;color:#888;min-width:10px;text-align:center;line-height:12px}
.cal-day--green{background:#e8f5e9;border-color:#c8e6c9}.cal-day--green .cal-day__count{color:#2e7d32}
.cal-day--yellow{background:#fff8e1;border-color:#ffe082}.cal-day--yellow .cal-day__count{color:#e65100}
.cal-day--red{background:#ffebee;border-color:#ef9a9a}.cal-day--red .cal-day__count{color:#c62828}
.cal-legend{display:flex;gap:14px;justify-content:center;margin-top:10px;font-size:10px;color:#888}
.cal-legend span{display:flex;align-items:center;gap:4px}.cal-legend i{width:10px;height:10px;border-radius:3px}
.bookings-section h3{font-size:14px;font-weight:700;margin-bottom:10px;letter-spacing:.5px}
.booking-status{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;padding:3px 8px;border-radius:6px;white-space:nowrap}
.status-new{background:linear-gradient(135deg,#0bc5ea,#8b5cf6);color:#fff}
.status-confirmed{background:#e8f5e9;color:#2e7d32}
.status-completed{background:#f5f5f5;color:#888}
.status-cancelled{background:#ffebee;color:#e53935}
.status-progress{background:#e3f2fd;color:#1565c0}
.empty-state{text-align:center;padding:30px 20px;color:#888;font-size:13px}
.tab-bar{display:flex;background:#fff;border-radius:12px;border:1.5px solid #eee;margin-bottom:16px;overflow:hidden}
.tab-bar button{flex:1;padding:10px;font-size:12px;font-weight:600;font-family:Inter,sans-serif;border:none;cursor:pointer;background:transparent;color:#888}
.tab-bar button.active{background:#111;color:#fff}
.tab-bar button:hover:not(.active){background:#f5f5f5}
.hidden{display:none!important}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;justify-content:center;align-items:center;padding:1rem;-webkit-backdrop-filter:blur(4px);backdrop-filter:blur(4px)}
.modal-overlay.active{display:flex}
.modal-box{background:#fff;max-width:480px;width:100%;border-radius:14px;padding:1.5rem;position:relative;max-height:80vh;overflow-y:auto;box-shadow:0 10px 40px rgba(0,0,0,.2)}
.modal-close{position:absolute;top:12px;right:14px;background:none;border:none;font-size:20px;cursor:pointer;color:#999;width:32px;height:32px;display:flex;align-items:center;justify-content:center;border-radius:50%}
.modal-close:hover{background:#f0f0f0}
*:focus{outline:none!important;box-shadow:none!important}
.detail-row{display:flex;padding:6px 0;border-bottom:1px solid #f0f0f0;font-size:13px}
.detail-row .label{color:#888;width:80px;flex-shrink:0}
.detail-row .value{font-weight:500}
.bookings-table{background:#fff;border-radius:12px;border:1.5px solid #eee;overflow:hidden}
.bookings-table table{width:100%;border-collapse:collapse;font-size:13px}
.bookings-table td{padding:8px 10px;border-bottom:1px solid #f0f0f0}
.bookings-table td:first-child{white-space:nowrap;font-weight:600;color:#111}
.bookings-table td:nth-child(5){text-align:right}
.bookings-table thead td{font-weight:600;color:#888;text-transform:uppercase;font-size:10px;letter-spacing:.5px;border-top:none;background:#fafafa;cursor:default}
.bookings-table tbody tr{cursor:pointer;transition:background .1s}
.bookings-table tbody tr:hover{background:#f0f0f0!important}
@media(max-width:640px){
.admin-container{padding:12px 10px 30px}.stats{gap:6px}.stat-card{padding:10px}.stat-card__value{font-size:20px}
.calendar-wrap{padding:8px}.cal-day{font-size:.75rem;padding:5px 0}.cal-day__count{font-size:7px}
.bookings-table td{padding:6px;font-size:12px}
}

.btn-grad,.btn-grad-del{background:linear-gradient(135deg,#0bc5ea,#8b5cf6);color:#fff;padding:5px 12px;font-size:11px;font-weight:600;font-family:Inter,sans-serif;border:none;border-radius:6px;cursor:pointer;transition:opacity .15s}.btn-grad:hover,.btn-grad-del:hover{opacity:.85}
.ts-slot{text-align:center;padding:8px 4px;font-size:13px;font-weight:500;color:#333;border:1px solid #ddd;border-radius:8px;cursor:pointer}
.ts-taken{color:#aaa;background:#f5f5f5;cursor:default}
tr.done td:not(:last-child){text-decoration:line-through!important;text-decoration-thickness:1px!important;opacity:.55}
</style>

<body>
<div id="loginScreen" class="login-screen">
  <div class="login-box">
    <h2>GALAXY MOTO</h2>
    <p>Панель управления записями</p>
    <input type="password" id="pinInput" placeholder="****" maxlength="4" inputmode="numeric" autocomplete="off" onkeydown="if(event.key==='Enter')doLogin()">
    <div class="error" id="loginError">Неверный пин-код</div>
    <button class="login-btn" onclick="doLogin()">Войти</button>
  </div>
</div>
<div id="adminApp" class="hidden">
  <div class="admin-header">
    <h1>GALAXY MOTO</h1>
    <a onclick="doLogout()">Выйти</a>
  </div>
  <div class="admin-container">
    <div class="stats" id="statsRow"></div>
    <div class="calendar-wrap" id="calWrap">

        <button onclick="calMove(-1)">‹</button>

        <button onclick="calMove(1)">›</button>

      <div class="cal-grid" id="calGrid"></div>
      <div class="cal-legend">

        <span><i style="background:#fff8e1;border:1px solid #ffe082"></i> 2</span>
        <span><i style="background:#ffebee;border:1px solid #ef9a9a"></i> 3+</span>
      </div>
    </div>
    <div class="tab-bar">
      <button class="active" onclick="switchTab(0)" id="tab0">Сегодня</button>
      <button onclick="switchTab(1)" id="tab1">Завтра</button>
      <button onclick="switchTab(2)" id="tab2">Все</button>
    </div>
    <div class="bookings-section" id="bookingsList"></div>
  </div>
</div>

<div class="modal-overlay" id="addModal">
  <div class="modal-box">
    <button class="modal-close" onclick="closeAddForm()">&times;</button>
    <h3 style="margin-bottom:12px">Новая запись</h3>
    <div style="margin-bottom:10px;padding:0 4px">
      <label style="font-size:12px;color:#888;display:block;margin-bottom:3px">Дата</label>
      <input type="date" id="addDate" onchange="renderTimeSlots()" style="width:100%;padding:10px 12px;font-size:14px;font-family:Inter,sans-serif;border:1.5px solid #ddd;border-radius:8px;outline:none;box-sizing:border-box">
    </div>
    <div style="margin-bottom:10px;padding:0 4px">
      <label style="font-size:12px;color:#888;display:block;margin-bottom:3px">Время</label><div id="addTimeSlots" style="display:grid;grid-template-columns:repeat(4,1fr);gap:6px"></div>
      <input type="hidden" id="addTime" value="">
    </div>
    <div style="margin-bottom:10px;padding:0 4px">
      <label style="font-size:12px;color:#888;display:block;margin-bottom:3px">Имя *</label>
      <input type="text" id="addName" placeholder="Имя" style="width:100%;padding:10px 12px;font-size:14px;font-family:Inter,sans-serif;border:1.5px solid #ddd;border-radius:8px;outline:none;box-sizing:border-box">
    </div>
    <div style="margin-bottom:10px;padding:0 4px">
      <label style="font-size:12px;color:#888;display:block;margin-bottom:3px">Телефон</label>
      <input type="tel" id="addPhone" placeholder="Телефон" style="width:100%;padding:10px 12px;font-size:14px;font-family:Inter,sans-serif;border:1.5px solid #ddd;border-radius:8px;outline:none;box-sizing:border-box">
    </div>
    <div style="margin-bottom:10px;padding:0 4px">
      <label style="font-size:12px;color:#888;display:block;margin-bottom:3px">Модель</label>
      <input type="text" id="addModel" placeholder="Модель" style="width:100%;padding:10px 12px;font-size:14px;font-family:Inter,sans-serif;border:1.5px solid #ddd;border-radius:8px;outline:none;box-sizing:border-box">
    </div>
    <div style="margin-bottom:10px;padding:0 4px">
      <label style="font-size:12px;color:#888;display:block;margin-bottom:3px">Комментарий</label>
      <textarea id="addNotes" rows="2" placeholder="Комментарий" style="width:100%;padding:10px 12px;font-size:14px;font-family:Inter,sans-serif;border:1.5px solid #ddd;border-radius:8px;outline:none;box-sizing:border-box;resize:vertical"></textarea>
    </div>
    <button class="btn-grad" style="width:100%;padding:10px;font-size:13px" onclick="saveNewRecord()">Сохранить</button>
  </div>
</div>


<div class="modal-overlay" id="masterModal" style="z-index:300">
  <div class="modal-box" style="max-width:360px">
    <button class="modal-close" onclick="closeMasterModal()">&times;</button>
    <h3 style="margin-bottom:6px">Выберите мастера</h3>
    <div style="display:flex;flex-direction:column;gap:8px" id="masterList"></div>
  </div>
</div>
<div class="modal-overlay" id="detailModal">
  <div class="modal-box">
    <button class="modal-close" onclick="closeDet()">&times;</button>
    <h3 id="detTitle" style="margin-bottom:12px">Детали записи</h3>
    <div id="detBody"></div>
    <div style="display:flex;gap:8px;margin-top:16px;flex-wrap:wrap" id="detActions"></div>
  </div>
</div>
<script>

var PIN='8888',BK=[],TB=0,CV=new Date(),SD=null,SD1=null,SD2=null,US=null,US2=null;
var SL={'new':'\u041d\u041e\u0412\u0410\u042f','in_progress':'\u0412 \u0420\u0410\u0411\u041e\u0422\u0415','completed':'\u0412\u042b\u041f\u041e\u041b\u041d\u0415\u041d\u0410','cancelled':'\u041e\u0422\u041c\u0415\u041d\u0415\u041d\u0410'};
var MN=['января','февраля','марта','апреля','мая','июня','июля','августа','сентября','октября','ноября','декабря'];var SC={'new':'status-new','in_progress':'status-progress','completed':'status-completed','cancelled':'status-cancelled'};
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function fmt(d){var y=d.getFullYear(),m=(d.getMonth()+1+'').padStart(2,'0'),dd=(d.getDate()+'').padStart(2,'0');return y+'-'+m+'-'+dd}
function same(a,b){return a.getFullYear()===b.getFullYear()&&a.getMonth()===b.getMonth()&&a.getDate()===b.getDate()}
function doLogin(){var p=document.getElementById('pinInput').value;if(p===PIN){localStorage.setItem('ga','1');document.getElementById('loginScreen').classList.add('hidden');document.getElementById('adminApp').classList.remove('hidden');try{initFB()}catch(e){}}else{document.getElementById('loginError').style.display='block'}}
function doLogout(){localStorage.removeItem('ga');if(US)US();if(US2)US2();document.getElementById('adminApp').classList.add('hidden');document.getElementById('loginScreen').classList.remove('hidden');document.getElementById('loginError').style.display='none'}
function initFB(){try{var FC={apiKey:'AIzaSyDOZnESPJRJlEf3HTYqNyv1O0mYUZoPJzc',authDomain:'capsulehouse-1c0c9.firebaseapp.com',projectId:'capsulehouse-1c0c9',storageBucket:'capsulehouse-1c0c9.firebasestorage.app',messagingSenderId:'640070206939',appId:'1:640070206939:web:e7ba997ec68457be2893fe'};try{firebase.initializeApp(FC);}catch(e){}var db=firebase.firestore();window.db=db;db.settings({merge:true});if(US||US2)return;BK=[];US2=db.collection('galaxymoto_bookings').onSnapshot(function(s){s.docChanges().forEach(function(c){var x=c.doc.data(),id=c.doc.id;if(c.type==='removed'){BK=BK.filter(function(b){return b.id!==id});R();return}if(x.date&&x.name){var i=BK.findIndex(function(b){return b.id===id});var b={id:id,date:x.date,time:x.time||'',name:x.name,phone:x.phone||'',model:x.model||'',notes:x.notes||'',status:x.status||'new',workDone:x.workDone||null,master:x.master||'',workDone:x.workDone||null,master:x.master||''};if(i>=0)BK[i]=b;else BK.push(b);R()}})});US=db.collection('leads').onSnapshot(function(s){s.docChanges().forEach(function(c){var x=c.doc.data(),id=c.doc.id;if(c.type==='removed'){BK=BK.filter(function(b){return b.id!==id});R();return}if(x.date&&x.name){var i=BK.findIndex(function(b){return b.id===id});var b={id:id,date:x.date,time:x.time||'',name:x.name,phone:x.phone||'',model:x.model||'',notes:x.notes||'',status:x.status||'new',workDone:x.workDone||null};if(i>=0)BK[i]=b;else BK.push(b);R()}})});}catch(e){} setTimeout(R,100);}
function R(){RSTAT();RCAL();RBOK()}
function RSTAT(){var n=BK.length,p=BK.filter(function(b){return b.status==='new'}).length,w=BK.filter(function(b){return b.status==='in_progress'}).length;document.getElementById('statsRow').innerHTML='<div class="stat-card"><div class="stat-card__value">'+n+'</div><div class="stat-card__label">\u0412\u0441\u0435\u0433\u043e</div></div><div class="stat-card"><div class="stat-card__value">'+p+'</div><div class="stat-card__label">\u041d\u043e\u0432\u044b\u0435</div></div><div class="stat-card"><div class="stat-card__value">'+w+'</div><div class="stat-card__label">\u0412\u0020\u0440\u0430\u0431\u043e\u0442\u0435</div></div><div class=\"stat-card\" style=\"cursor:pointer;background:#111;color:#fff\" onclick=\"openAddForm()\"><div class=\"stat-card__value\" style=\"color:#fff;font-size:28px\">+</div><div class=\"stat-card__label\" style=\"color:rgba(255,255,255,.7)\">\u041d\u043e\u0432\u0430\u044f \u0437\u0430\u043f\u0438\u0441\u044c</div></div><div class=\"stat-card\" style=\"cursor:pointer;background:linear-gradient(135deg,#0bc5ea,#8b5cf6);color:#fff\" onclick=\"openStats()\"><div class=\"stat-card__value\" style=\"color:#fff;font-size:28px\">\u2206</div><div class=\"stat-card__label\" style=\"color:rgba(255,255,255,.7)\">\u0421\u0442\u0430\u0442\u0438\u0441\u0442\u0438\u043a\u0430</div></div>'}
function RCAL(){var y=CV.getFullYear(),m=CV.getMonth();document.getElementById('calMonth').textContent=new Date(y,m).toLocaleDateString('ru',{month:'long',year:'numeric'});var fd=new Date(y,m,1).getDay();fd=(fd===0?6:fd-1);var ld=new Date(y,m+1,0).getDate(),pd=new Date(y,m,1-fd).getDate(),h='',td=new Date(),dw='\u041f\u043d,\u0412\u0442,\u0421\u0440,\u0427\u0442,\u041f\u0442,\u0421\u0431,\u0412\u0441'.split(',');dw.forEach(function(w){h+='<div class="cal-weekday">'+w+'</div>'});for(var i=0;i<fd;i++){h+='<div class="cal-day cal-day--other">'+pd+'</div>';pd++}for(var d=1;d<=ld;d++){var dt=new Date(y,m,d),ds=fmt(dt),cnt=BK.filter(function(b){return b.date===ds}).length,cl='cal-day';if(same(dt,td))cl+=' cal-day--today';if(SD1&&same(dt,SD1))cl+=' cal-day--selected';if(SD2&&same(dt,SD2))cl+=' cal-day--selected';if(cnt===1)cl+=' cal-day--green';else if(cnt===2)cl+=' cal-day--yellow';else if(cnt>=3)cl+=' cal-day--red';h+='<div class="'+cl+'" onclick="pickDate('+d+')"><span>'+d+'</span>'+(cnt>0?'<span class="cal-day__count">'+cnt+'</span>':'')+'</div>'}var rm=(7-(fd+ld)%7)%7;for(var i=0;i<rm;i++){h+='<div class="cal-day cal-day--other">'+(i+1)+'</div>'}document.getElementById('calGrid').innerHTML=h}
function calMove(d){CV.setMonth(CV.getMonth()+d);RCAL()}

function renderTimeSlots(){
  var dt=document.getElementById("addDate").value;
  var cont=document.getElementById("addTimeSlots");
  if(!dt||!cont)return;
  var h="";
  for(var hh=11;hh<19;hh++){
    for(var mm=0;mm<60;mm+=30){
      var ti=String(hh).padStart(2,"0")+":"+String(mm).padStart(2,"0");
      var taken=BK.some(function(b){return b.date===dt&&b.time===ti});
      if(taken){
        h+="<div class='ts-slot ts-taken'>"+ti+"</div>";
      }else{
        h+="<div class='ts-slot ts-free' onclick=\"selectSlot(this,'"+ti+"')\">"+ti+"</div>";
      }
    }
  }
  cont.innerHTML=h;
}

var workBookingId = "";

var MASTERS = ["Денис","Дмитрий","Алексей"];
var pendingConfirmId = "";
function openMasterSelect(id){
  pendingConfirmId=id;
  var list=document.getElementById("masterList");
  var h="";
  h+="<div style=\"margin-bottom:8px;font-size:13px;color:#888\">Выберите мастера (можно несколько):</div>";
  for(var i=0;i<MASTERS.length;i++){
    h+="<label style=\"display:flex;align-items:center;gap:10px;padding:10px 12px;border:1.5px solid #ddd;border-radius:8px;margin-bottom:6px;cursor:pointer;font-size:14px;font-weight:500;color:#333\">";
    h+="<input type=\"checkbox\" class=\"master-cb\" value=\""+i+"\" style=\"width:16px;height:16px;cursor:pointer\">";
    h+=MASTERS[i]+"</label>";
  }
  h+="<button onclick=\"saveMasterSelect()\" style=\"width:100%;padding:10px;font-size:14px;font-weight:600;font-family:Inter,sans-serif;color:#fff;background:linear-gradient(135deg,#0bc5ea,#8b5cf6);border:none;border-radius:8px;cursor:pointer;margin-top:4px\">Сохранить</button>";
  list.innerHTML = h;
  document.getElementById("masterModal").classList.add("active");
}
function closeMasterModal(){
  document.getElementById("masterModal").classList.remove("active");
}
function saveMasterSelect(){
  var cbs = document.querySelectorAll(".master-cb:checked");
  if(cbs.length===0){alert("Выберите хотя бы одного мастера");return}
  var selected = [];
  for(var i=0;i<cbs.length;i++) selected.push(MASTERS[parseInt(cbs[i].value)]);
  var masterStr = selected.join(", ");
  setStat(pendingConfirmId, "in_progress", masterStr);
  closeMasterModal();
  closeDet();
}
function openWorkForm(id){
  workBookingId = id;
  var b = BK.find(function(x){return x.id===id});
  document.getElementById("workModal").classList.add("active");
  document.getElementById("workMileage").value = "";
  document.getElementById("workItems").innerHTML = "";
  for(var i=0;i<3;i++) addWorkRow();
  if(b && b.master){
    var masters = b.master.split(", ");
    var sels = document.querySelectorAll(".wi-master");
    sels.forEach(function(s,i){
      s.innerHTML = "";
      for(var j=0;j<MASTERS.length;j++){
        s.innerHTML += "<option value=\""+MASTERS[j]+"\">"+MASTERS[j]+"</option>";
      }
      // Auto-select based on assigned masters
      var assigned = (b.master||"").split(", ");
      if(assigned.length===1) s.value = assigned[0];
      else if(assigned.length===2) s.value = i===0?assigned[0]:assigned[1];
    });
}
calcWorkTotal();
}
function closeWorkForm(){
  document.getElementById("workModal").classList.remove("active");
}
function addWorkRow(){
  var tb = document.getElementById("workItems");
  var tr = document.createElement("tr");
  tr.innerHTML = '<td style="padding:4px"><input class="wi-name" placeholder="Наименование" style="width:100%;padding:10px 12px;font-size:14px;font-family:Inter,sans-serif;border:1.5px solid #ddd;border-radius:8px;outline:none;box-sizing:border-box"></td><td style="padding:4px"><input class="wi-price" type="number" placeholder="0" oninput="calcWorkTotal()" style="width:100%;padding:10px 12px;font-size:14px;font-family:Inter,sans-serif;border:1.5px solid #ddd;border-radius:8px;outline:none;box-sizing:border-box;text-align:right"></td><td style="padding:4px"><select class="wi-master" style="width:100%;padding:10px 12px;font-size:14px;font-family:Inter,sans-serif;border:1.5px solid #ddd;border-radius:8px;outline:none;box-sizing:border-box;cursor:pointer"></select></td>';
  tb.appendChild(tr);
  // Populate master dropdown for new row
  var b2 = BK.find(function(x){return x.id===workBookingId});
  if(b2 && b2.master){
    var ss = tr.querySelector(".wi-master");
    ss.innerHTML = "";
    for(var k=0;k<MASTERS.length;k++){
      ss.innerHTML += "<option value=\""+MASTERS[k]+"\">"+MASTERS[k]+"</option>";
    }
  }
}
function calcWorkTotal(){
  var total = 0;
  document.querySelectorAll(".wi-price").forEach(function(el){
    total += parseFloat(el.value) || 0;
  });
  document.getElementById("workTotal").textContent = total;
}
function saveWork(mode){
  var mileage = document.getElementById("workMileage").value.trim();
  var items = [];
  var names = document.querySelectorAll(".wi-name");
  var prices = document.querySelectorAll(".wi-price");
  var masters = document.querySelectorAll(".wi-master");
  for(var i=0;i<names.length;i++){
    var n = names[i].value.trim();
    var p = parseFloat(prices[i].value) || 0;
    var m = masters[i] ? masters[i].value : "";
    if(n || p){
      var item = {name:n||"-",price:p};
      if(m) item.master = m;
      items.push(item);
    }
  }
  try{
    var d = firebase.firestore();
    d.collection("leads").doc(workBookingId).update({
      status: (mode==="complete" ? "completed" : "in_progress"),
      completedAt: new Date().toISOString(),
      workDone: {mileage:mileage,items:items,total:document.getElementById("workTotal").textContent}
    }).catch(function(){});
    d.collection("galaxymoto_bookings").doc(workBookingId).update({
      status: (mode==="complete" ? "completed" : "in_progress"),
      completedAt: new Date().toISOString(),
      workDone: {mileage:mileage,items:items,total:document.getElementById("workTotal").textContent}
    }).catch(function(){});
  }catch(e){}
  closeWorkForm();
  closeDet();
}


/* \u0421\u0422\u0410\u0422\u0418\u0421\u0422\u0418\u041a\u0410 */
var statsPeriod='today',statsMaster='all',statsDate1='',statsDate2='';
function openStats(){
  document.getElementById('statsModal').classList.add('active');
  statsPeriod='today';
  statsMaster='all';
  statsDate1='';
  statsDate2='';
  renderStats();
}
function closeStats(){
  document.getElementById('statsModal').classList.remove('active');
}
function setStatsPeriod(p,el){
  statsPeriod=p;
  document.querySelectorAll('.sp-btn').forEach(function(b){b.classList.remove('active')});
  if(el)el.classList.add('active');
  var dr=document.getElementById('statsDateRange');
  if(p==='custom'){dr.classList.remove('hidden')}else{dr.classList.add('hidden')}
  renderStats();
}
function setStatsMaster(el){
  statsMaster=el.value;
  renderStats();
}
function applyStatsCustom(){
  statsDate1=document.getElementById('statsDate1').value;
  statsDate2=document.getElementById('statsDate2').value;
  renderStats();
}
function renderStats(){
  var now=new Date();now.setHours(0,0,0,0);
  var flt=[];
  for(var i=0;i<BK.length;i++){
    var b=BK[i],bd=new Date(b.date+'T00:00:00');
    var ok=false;
    if(statsPeriod==='today'){
      ok=bd.getTime()===now.getTime();
    }else if(statsPeriod==='week'){
      var weekStart=new Date(now);weekStart.setDate(now.getDate()-now.getDay());
      var weekEnd=new Date(weekStart);weekEnd.setDate(weekStart.getDate()+6);
      ok=bd>=weekStart&&bd<=weekEnd;
    }else if(statsPeriod==='month'){
      ok=bd.getMonth()===now.getMonth()&&bd.getFullYear()===now.getFullYear();
    }else if(statsPeriod==='custom'){
      if(statsDate1&&statsDate2){
        var d1=new Date(statsDate1+'T00:00:00'),d2=new Date(statsDate2+'T00:00:00');
        ok=bd>=d1&&bd<=d2;
      }else if(statsDate1){
        var d1=new Date(statsDate1+'T00:00:00');
        ok=bd.getTime()===d1.getTime();
      }else{
        ok=true;
      }
    }else{ok=true}
    if(ok&&statsMaster!=='all'&&b.master&&b.master.indexOf(statsMaster)<0)ok=false;
    if(ok&&statsMaster!=='all'&&!b.master)ok=false;
    if(ok)flt.push(b);
  }
  // \u0421\u0447\u0451\u0442\u0447\u0438\u043a\u0438
  var tc=flt.length;
  var nc=flt.filter(function(x){return x.status==='new'}).length;
  var ip=flt.filter(function(x){return x.status==='in_progress'}).length;
  var dn=flt.filter(function(x){return x.status==='completed'}).length;
  var cn=flt.filter(function(x){return x.status==='cancelled'}).length;
  var rev=0,cnt=0;
  flt.forEach(function(x){if(x.workDone&&x.workDone.total){rev+=parseInt(x.workDone.total)||0;cnt++}});
  var avg=cnt>0?Math.round(rev/cnt):0;
  var h='';
  h+='<div class="stats" style="margin-bottom:16px">';
  h+='<div class="stat-card"><div class="stat-card__value">'+tc+'</div><div class="stat-card__label">\u0412\u0441\u0435\u0433\u043e</div></div>';
  h+='<div class="stat-card"><div class="stat-card__value">'+nc+'</div><div class="stat-card__label">\u041d\u043e\u0432\u044b\u0435</div></div>';
  h+='<div class="stat-card"><div class="stat-card__value">'+ip+'</div><div class="stat-card__label">\u0412 \u0440\u0430\u0431\u043e\u0442\u0435</div></div>';
  h+='<div class="stat-card"><div class="stat-card__value">'+dn+'</div><div class="stat-card__label">\u0412\u044b\u043f\u043e\u043b\u043d\u0435\u043d\u043e</div></div>';
  h+='<div class="stat-card"><div class="stat-card__value">'+cn+'</div><div class="stat-card__label">\u041e\u0442\u043c\u0435\u043d\u0435\u043d\u043e</div></div>';
  h+='</div>';
  h+='<div class="stats" style="margin-bottom:16px">';
  h+='<div class="stat-card" style="background:#fff8e1;border-color:#ffe082"><div class="stat-card__value" style="color:#e65100">'+rev.toLocaleString()+' \u0440\u0443\u0431</div><div class="stat-card__label">\u0412\u044b\u0440\u0443\u0447\u043a\u0430</div></div>';
  h+='<div class="stat-card" style="background:#e8f5e9;border-color:#c8e6c9"><div class="stat-card__value" style="color:#2e7d32">'+avg.toLocaleString()+' \u0440\u0443\u0431</div><div class="stat-card__label">\u0421\u0440\u0435\u0434\u043d\u0438\u0439 \u0447\u0435\u043a</div></div>';
  h+='</div>';
  // \u0420\u0430\u0437\u0431\u0438\u0432\u043a\u0430 \u043f\u043e \u043c\u0430\u0441\u0442\u0435\u0440\u0430\u043c
  var mStats={};
  flt.forEach(function(x){
    if(x.master){
      var ms=x.master.split(', ');
      ms.forEach(function(m){
        if(!mStats[m])mStats[m]={total:0,count:0,revenue:0};
        mStats[m].count++;
        if(x.workDone&&x.workDone.total)mStats[m].revenue+=parseInt(x.workDone.total)||0;
      });
    }
  });
  var mk=Object.keys(mStats);
  if(mk.length>0){
    h+='<div style="background:#fff;border-radius:12px;border:1.5px solid #eee;padding:12px;margin-bottom:16px">';
    
    h+='<div style="font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:#888;margin-bottom:8px">\u0420\u0430\u0437\u0431\u0438\u0432\u043a\u0430 \u043f\u043e \u0441\u043e\u0442\u0440\u0443\u0434\u043d\u0438\u043a\u0430\u043c</div>';
    h+='<div style="display:flex;flex-direction:column;gap:6px">';
    mk.sort().forEach(function(m){
      var ms=mStats[m];
      h+='<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 10px;background:#fafafa;border-radius:8px;font-size:13px">';
      h+='<span style="font-weight:600">'+m+'</span>';
      h+='<span style="color:#888">'+ms.count+' записей, выручка: <strong style="color:#111">'+ms.revenue.toLocaleString()+' руб</strong></span>';
      h+='</div>';
    });
    h+='</div></div>';
  }
  // Детальная таблица
  h+='<div class="bookings-table"><table><thead><tr><td>Дата</td><td>Имя</td><td>Телефон</td><td>Модель</td><td>Мастер</td><td style="text-align:right">Статус</td></tr></thead><tbody>';
  flt.sort(function(a,b){return a.date.localeCompare(b.date)||a.time.localeCompare(b.time)}).forEach(function(b){
    var st=b.status||'new';
    h+='<tr style="cursor:default" onclick="closeStats();openDet(\''+b.id+'\')"><td>'+b.date.split('-').reverse().join('.')+(b.time?' '+b.time:'')+'</td><td>'+esc(b.name)+'</td><td>'+(b.phone||'-')+'</td><td>'+(b.model?esc(b.model):'-')+'</td><td>'+(b.master||'-')+'</td><td style="text-align:right"><span class="booking-status '+SC[st]+'">'+SL[st]+'</span></td></tr>';
  });
  h+='</tbody></table></div>';
  document.getElementById('statsBody').innerHTML = h;
}
</script>

  <div class="modal-box" style="max-width:860px">
